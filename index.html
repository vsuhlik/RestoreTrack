<!DOCTYPE html>
<html data-theme="shadow">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RestoreTrack">
<meta name="theme-color" content="#0D0B14">
<meta name="description" content="Personal foreskin restoration tracker. Log sessions, track CI progress, and connect with the restoration community.">
<title>RestoreTrack</title>

<!-- Styling -->
<link rel="stylesheet" href="style.css">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase (must load before app.js) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- App root — all UI is injected here by app.js -->
<div id="root"></div>

<!-- Toast notification — positioned fixed, managed by app.js -->
<div class="toast" id="toast" style="display:none"></div>

<!-- Application logic -->
<script src="app.js"></script>

</body>
</html>
