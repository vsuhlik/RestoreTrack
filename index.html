<!DOCTYPE html>
<html data-theme="shadow">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Foreskin Restoration RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── THEMES ──────────────────────────────────────────────────────────────── */
:root{--bg:#0D0B14;--bg-card:rgba(22,18,34,.97);--bg-card-gold:linear-gradient(135deg,rgba(22,18,34,.98),rgba(16,12,28,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#0E0C17;--bg-hdr:linear-gradient(180deg,#1a1628,#130F1E);--bg-sheet:#12101e;--bg-ps:#0D0B14;--hdr-border:rgba(201,168,76,.25);--nav-border:rgba(201,168,76,.15);--card-border:rgba(201,168,76,.1);--card-border-gold:rgba(201,168,76,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#C9A84C;--acc6:rgba(201,168,76,.06);--acc12:rgba(201,168,76,.12);--acc18:rgba(201,168,76,.18);--acc30:rgba(201,168,76,.3);--acc45:rgba(201,168,76,.5);--text1:#E2DDD0;--text2:#aaa;--text3:#888;--text4:#555;--text5:#444;--text6:#333;--xp1:#7a5a10;--xp2:#C9A84C;--xp3:#F0D070;--btn1:#7a5a10;--btn2:#C9A84C;--btxt:#1a0e00;--lv-done:#7a6030;--lv-fut:#252525;--pill-border:rgba(201,168,76,.4);--scrollbar:#2a2535}
[data-theme="ivory"]{--bg:#F0EDE6;--bg-card:rgba(255,255,255,.97);--bg-card-gold:linear-gradient(135deg,rgba(255,252,244,.99),rgba(245,238,222,.99));--bg-stat:rgba(0,0,0,.04);--bg-nav:#FFF;--bg-hdr:linear-gradient(180deg,#FFF,#F0EDE6);--bg-sheet:#FAFAF7;--bg-ps:#F0EDE6;--hdr-border:rgba(122,92,16,.2);--nav-border:rgba(122,92,16,.12);--card-border:rgba(122,92,16,.15);--card-border-gold:rgba(122,92,16,.3);--stat-border:rgba(0,0,0,.09);--surf-border:rgba(0,0,0,.07);--accent:#7A5C10;--acc6:rgba(122,92,16,.06);--acc12:rgba(122,92,16,.1);--acc18:rgba(122,92,16,.14);--acc30:rgba(122,92,16,.28);--acc45:rgba(122,92,16,.45);--text1:#1a1710;--text2:#5a5040;--text3:#7a6a50;--text4:#9a8a70;--text5:#aaa090;--text6:#bfb8a8;--xp1:#5a3e08;--xp2:#7A5C10;--xp3:#B89030;--btn1:#5a3e08;--btn2:#7A5C10;--btxt:#FFF8E8;--lv-done:#5a4008;--lv-fut:#c8c0b4;--pill-border:rgba(122,92,16,.4);--scrollbar:#d0cbc4}
[data-theme="forest"]{--bg:#0A1409;--bg-card:rgba(11,22,10,.97);--bg-card-gold:linear-gradient(135deg,rgba(14,28,13,.98),rgba(9,18,8,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#060E05;--bg-hdr:linear-gradient(180deg,#142010,#0A1409);--bg-sheet:#0e1c0d;--bg-ps:#0A1409;--hdr-border:rgba(76,175,80,.25);--nav-border:rgba(76,175,80,.15);--card-border:rgba(76,175,80,.12);--card-border-gold:rgba(76,175,80,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#4CAF50;--acc6:rgba(76,175,80,.06);--acc12:rgba(76,175,80,.12);--acc18:rgba(76,175,80,.18);--acc30:rgba(76,175,80,.3);--acc45:rgba(76,175,80,.5);--text1:#D0EDD0;--text2:#7aaa77;--text3:#5a8855;--text4:#4a7048;--text5:#3a583a;--text6:#2a3e2a;--xp1:#1a5c1e;--xp2:#4CAF50;--xp3:#80D880;--btn1:#1a5c1e;--btn2:#4CAF50;--btxt:#040e04;--lv-done:#2d7030;--lv-fut:#1a241a;--pill-border:rgba(76,175,80,.4);--scrollbar:#1a2e1a}
[data-theme="ocean"]{--bg:#050D18;--bg-card:rgba(7,16,34,.97);--bg-card-gold:linear-gradient(135deg,rgba(8,20,42,.98),rgba(5,12,28,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#030A12;--bg-hdr:linear-gradient(180deg,#0A1A32,#050D18);--bg-sheet:#081428;--bg-ps:#050D18;--hdr-border:rgba(56,180,212,.25);--nav-border:rgba(56,180,212,.15);--card-border:rgba(56,180,212,.12);--card-border-gold:rgba(56,180,212,.28);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#38B4D4;--acc6:rgba(56,180,212,.06);--acc12:rgba(56,180,212,.12);--acc18:rgba(56,180,212,.18);--acc30:rgba(56,180,212,.3);--acc45:rgba(56,180,212,.5);--text1:#C8E8F5;--text2:#6898AA;--text3:#4a7888;--text4:#3a6272;--text5:#2e5060;--text6:#22404e;--xp1:#0a4a6a;--xp2:#38B4D4;--xp3:#80D8EE;--btn1:#0a4a6a;--btn2:#38B4D4;--btxt:#020d14;--lv-done:#256880;--lv-fut:#0e1e28;--pill-border:rgba(56,180,212,.4);--scrollbar:#0d2234}
[data-theme="neon"]{--bg:#07060E;--bg-card:rgba(12,9,22,.97);--bg-card-gold:linear-gradient(135deg,rgba(18,10,32,.98),rgba(10,6,20,.98));--bg-stat:rgba(255,255,255,.025);--bg-nav:#050409;--bg-hdr:linear-gradient(180deg,#10081C,#07060E);--bg-sheet:#0e0a1e;--bg-ps:#07060E;--hdr-border:rgba(220,0,255,.3);--nav-border:rgba(220,0,255,.18);--card-border:rgba(220,0,255,.14);--card-border-gold:rgba(220,0,255,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.06);--accent:#DC00FF;--acc6:rgba(220,0,255,.06);--acc12:rgba(220,0,255,.12);--acc18:rgba(220,0,255,.2);--acc30:rgba(220,0,255,.32);--acc45:rgba(220,0,255,.55);--text1:#F0E5FF;--text2:#9966CC;--text3:#7744AA;--text4:#5a3388;--text5:#442266;--text6:#331144;--xp1:#6600AA;--xp2:#DC00FF;--xp3:#FF80FF;--btn1:#5500AA;--btn2:#CC00EE;--btxt:#F0E5FF;--lv-done:#8800AA;--lv-fut:#1a0e2a;--pill-border:rgba(220,0,255,.5);--scrollbar:#1a0e2a}
[data-theme="neon"] .hdr-title,[data-theme="neon"] .ci-big,[data-theme="neon"] .big-timer{text-shadow:0 0 14px var(--accent),0 0 28px var(--acc18)}
[data-theme="neon"] .lv-pill{box-shadow:0 0 10px var(--acc30)}
/* ── BASE ───────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text1);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:14px;transition:background .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:70px}
.hdr{background:var(--bg-hdr);border-bottom:1px solid var(--hdr-border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr-title{font-family:'Cinzel',serif;font-size:14px;color:var(--accent);letter-spacing:2px}
.lv-pill{background:var(--acc12);border:1px solid var(--pill-border);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:var(--accent);font-family:'Cinzel',serif}
.profile-btn{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.profile-btn:hover{border-color:var(--acc30);color:var(--accent)}
.content{padding:12px;flex:1}
.card{background:var(--bg-card);border:1px solid var(--card-border);border-radius:12px;padding:12px;margin-bottom:9px}
.card-gold{border-color:var(--card-border-gold)!important;background:var(--bg-card-gold)!important}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text4);margin:12px 0 6px}
.xp-bar{height:8px;background:var(--bg-stat);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--xp1),var(--xp2),var(--xp3));transition:width .8s ease}
.goal-bar{height:10px;background:var(--bg-stat);border-radius:5px;overflow:hidden;margin:5px 0}
.goal-fill{height:100%;border-radius:5px;transition:width .6s ease}
.goal-fill-ok{background:linear-gradient(90deg,#0f5c2e,#22a85a)}
.goal-fill-warn{background:linear-gradient(90deg,var(--xp1),var(--xp2))}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.stat{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:10px;padding:9px 10px}
.sv{font-size:20px;font-weight:700;color:var(--text1);line-height:1}
.sl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.lrow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--stat-border)}
.lrow:last-child{border-bottom:none}
.lcirc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'Cinzel',serif}
.la{background:var(--acc18);border:1.5px solid var(--accent);color:var(--accent)}
.ld{background:var(--acc6);border:1px solid var(--acc30);color:var(--lv-done)}
.lf{background:var(--bg-stat);border:1px solid var(--stat-border);color:var(--lv-fut)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.cat-btn{background:var(--bg-stat);border-radius:10px;padding:11px 8px;cursor:pointer;text-align:center;transition:all .2s;border:1px solid var(--stat-border)}
.cat-btn.active{background:var(--acc6)}
.meth-btn{display:block;width:100%;background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:7px;padding:9px 12px;cursor:pointer;text-align:left;color:var(--text3);font-size:12px;margin-bottom:5px;font-family:'DM Sans',sans-serif;transition:all .15s}
.meth-btn:hover{background:var(--acc6);color:var(--text2)}
.meth-btn.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent);font-weight:600}
.big-timer{font-size:50px;font-weight:900;font-family:'Cinzel',serif;color:var(--accent);letter-spacing:3px;text-align:center;line-height:1;margin:8px 0}
.big-timer.running{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.btn-green{background:linear-gradient(135deg,#0f5c2e,#22a85a);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-red{background:linear-gradient(135deg,#5c0f0f,#c0392b);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-gold{background:linear-gradient(135deg,var(--btn1),var(--btn2));border:none;border-radius:10px;padding:13px;color:var(--btxt);font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:opacity .2s}
.btn-gold:hover{opacity:.9}
.btn-gold:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:10px;padding:11px;color:var(--text3);font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-ghost:hover{background:var(--acc6);color:var(--text2)}
.btn-outline{background:none;border:1px solid var(--acc30);border-radius:8px;padding:8px 14px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{background:var(--acc6)}
textarea{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:9px 11px;color:var(--text1);font-size:12px;width:100%;outline:none;resize:vertical;min-height:55px;font-family:'DM Sans',sans-serif}
textarea::placeholder{color:var(--text5)}
textarea:focus{border-color:var(--acc30)}
/* charts */
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:100px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{border-radius:3px 3px 0 0;width:100%;background:var(--acc18);min-height:2px;transition:height .5s ease}
.bar.today{background:linear-gradient(180deg,var(--xp3),var(--xp2))}
.bar-lbl{font-size:9px;color:var(--text4);text-align:center}
.bar-val{font-size:8px;color:var(--text5);text-align:center;min-height:10px}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:4px 0}
.cal-dot{aspect-ratio:1;border-radius:3px;background:var(--bg-stat)}
.cal-dot.on{background:var(--acc45)}
.cal-dot.goal{background:rgba(34,168,90,.55)}
.cal-dot.now{border:1.5px solid var(--accent)}
/* ci */
.ci-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--stat-border);align-items:flex-start}
.ci-row:last-child{border-bottom:none}
.ci-badge{background:var(--acc12);border:1px solid var(--acc30);border-radius:5px;padding:2px 6px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--accent);width:44px;text-align:center;flex-shrink:0}
/* achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ach-card{border-radius:10px;padding:12px 9px;text-align:center}
.ach-card.unlocked{background:var(--acc6);border:1px solid var(--acc30)}
.ach-card.locked{background:var(--bg-stat);border:1px solid var(--stat-border);opacity:.3}
/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-nav);border-top:1px solid var(--nav-border);display:flex;max-width:480px;margin:0 auto;z-index:20}
.nav-btn{flex:1;padding:8px 0 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text5);transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:18px;line-height:1.2}
/* toasts & flash */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--acc45);border-radius:12px;padding:11px 20px;color:var(--accent);font-weight:600;font-size:13px;z-index:300;white-space:pre-line;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:sd .3s ease}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.xp-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:var(--xp3);z-index:400;pointer-events:none;animation:xpf .9s ease forwards}
@keyframes xpf{0%{opacity:0;transform:translate(-50%,-65%)}30%{opacity:1;transform:translate(-50%,-50%)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-38%)}}
/* sheets */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:50;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.sheet{background:var(--bg-sheet);border:1px solid var(--card-border);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--stat-border);border-radius:2px;margin:0 auto 16px}
/* profile screen */
.pscreen{position:fixed;inset:0;background:var(--bg-ps);z-index:100;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;max-width:480px;margin:0 auto}
.pcard{background:var(--bg-card);border:1px solid var(--card-border);border-radius:14px;padding:16px;width:100%;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:border-color .2s}
.pcard:hover{border-color:var(--acc45)}
.pcard.active-p{border-color:var(--accent);background:var(--acc6)}
.pavatar{width:40px;height:40px;border-radius:50%;background:var(--acc12);border:1px solid var(--acc30);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0}
.gold-inp{background:var(--bg-stat);border:1px solid var(--acc30);border-radius:8px;padding:10px 14px;color:var(--text1);font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.gold-inp:focus{border-color:var(--accent)}
.gold-inp::placeholder{color:var(--text4)}
/* theme chips */
.theme-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.theme-chip{border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .25s;flex:1;max-width:78px}
.theme-chip.sel{border-color:var(--accent)}
.theme-swatch{width:100%;padding:10px 6px 7px;display:flex;flex-direction:column;align-items:center;gap:4px}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-lbl{font-size:8px;font-weight:700;text-align:center}
/* misc */
.live-dot{width:7px;height:7px;border-radius:50%;background:#22a85a;animation:blink 1.2s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.del-btn{background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.2);border-radius:6px;padding:3px 8px;color:#a03232;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn:hover{background:rgba(200,50,50,.15)}
.goal-inp{background:var(--bg-stat);border:1px solid var(--acc30);border-radius:7px;padding:4px 8px;color:var(--accent);font-size:13px;font-weight:700;width:52px;outline:none;text-align:center;font-family:'Cinzel',serif}
.xp-tag{background:var(--acc6);border:1px solid var(--acc30);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent);font-weight:600;display:inline-block;margin-top:6px}
.mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-pill{flex:1;padding:8px;border-radius:8px;background:var(--bg-stat);border:1px solid var(--surf-border);cursor:pointer;font-size:12px;font-weight:500;color:var(--text4);font-family:'DM Sans',sans-serif;text-align:center;transition:all .2s}
.mode-pill.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent)}
.page-title{font-family:'Cinzel',serif;font-size:14px;color:var(--accent);margin-bottom:2px}
.page-sub{font-size:11px;color:var(--text4);margin-bottom:12px}
.empty{text-align:center;padding:36px 16px;color:var(--text5);font-size:12px;line-height:2}
.ci-big{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--accent);line-height:1}
.xp-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text4);margin-bottom:3px}
.total-row{margin-top:8px;padding:7px 10px;background:var(--acc6);border-radius:7px;display:flex;justify-content:space-between;font-size:11px}
.time-entry{display:flex;align-items:center;gap:8px;justify-content:center;margin:10px 0}
.time-inp{background:var(--bg-stat);border:1px solid var(--acc30);border-radius:8px;padding:8px 6px;color:var(--accent);font-size:28px;font-weight:700;font-family:'Cinzel',serif;outline:none;text-align:center;width:72px}
.time-sep{font-size:28px;font-weight:700;color:var(--text4);font-family:'Cinzel',serif}
.time-lbl{font-size:10px;color:var(--text4);text-align:center;margin-top:2px}
.divider{width:100%;text-align:center;font-size:10px;color:var(--text5);text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px}
/* quote card */
.quote-card{background:var(--acc6);border:1px solid var(--acc18);border-radius:10px;padding:12px 14px;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
.quote-mark{font-size:28px;line-height:1;color:var(--acc30);font-family:'Cinzel',serif;flex-shrink:0;margin-top:-4px}
/* photo grid */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:1px solid var(--stat-border);background:var(--bg-stat);display:flex;align-items:center;justify-content:center;color:var(--text5);font-size:11px;text-align:center;transition:border-color .2s}
.photo-thumb:hover{border-color:var(--acc30)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:7px}
/* photo viewer */

.photo-viewer img{max-width:100%;max-height:70vh;border-radius:10px;object-fit:contain}

.ci-select-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.ci-sel-btn{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--text3);transition:all .15s}
.ci-sel-btn.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent)}
</style>

<body>
<div id="root"></div>
<div class="toast" id="toast" style="display:none"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const XP_TABLE=[0,100,300,650,1200,2000,3100,4600,6600,9300,12800];
const LEVELS=[
  {rank:'Neophyte',title:'The Awakening',ci:'CI-0',desc:'The journey begins. No coverage while flaccid.'},
  {rank:'Initiate',title:'First Light',ci:'CI-1',desc:'Skin covers less than half the glans while flaccid.'},
  {rank:'Apprentice',title:'The Emerging',ci:'CI-2',desc:'Skin covers at least half the glans while flaccid.'},
  {rank:'Journeyman',title:'The Deepening',ci:'CI-3',desc:'Skin covers the entire glans while flaccid.'},
  {rank:'Adept',title:'Half the Way',ci:'CI-4',desc:'Skin bunches up visibly beyond the glans while flaccid.'},
  {rank:'Skilled',title:'The Turning',ci:'CI-5',desc:'Skin covers over the glans and beyond — partial rollover.'},
  {rank:'Expert',title:'The Rolling',ci:'CI-6',desc:'Skin rolls over glans easily. Erect coverage begins.'},
  {rank:'Master',title:'Advanced',ci:'CI-7',desc:'Skin covers more than half the glans while erect.'},
  {rank:'Grand Master',title:'Near Complete',ci:'CI-8',desc:'Skin covers glans while erect with a short overhang.'},
  {rank:'Champion',title:'The Final Push',ci:'CI-9',desc:'Generous overhang covers glans completely while erect.'},
  {rank:'The Restored',title:'Journey Complete',ci:'CI-10',desc:'Full coverage flaccid and erect. Journey complete.'}
];
const CATS=[
  {id:'manual',label:'Manual',icon:'✋',mult:1.0,color:'#F59E0B',methods:['CAR 1','CAR 2','CAR 3','Manual Method (MM)','O-Pulling','Two-Point Stretch','BIB Method','Push Method','Three-Finger Pull','Cross Tug','V-Stretch','Squeeze & Pull']},
  {id:'device',label:'Devices',icon:'⚙',mult:0.8,color:'#60A5FA',methods:['DTR (Dual Tension Restorer)','TLC Tugger','HyperRestore','Foreballs','CAT II Q','Stealth Retainer','FiTness Device','PUD','Supercanister','Foreskinned','TugAhoy','Your-Skin Cone','foreGestalt']},
  {id:'tape',label:'Taping',icon:'📐',mult:0.9,color:'#A78BFA',methods:['T-Tape','3M Tegaderm','ROP Tape (Ring of Power)','Medical Tape','Kinesiology Tape','Buddy Tape']},
  {id:'special',label:'Special',icon:'⚡',mult:1.1,color:'#34D399',methods:['Mantor (Inflation)','Air Inflation','Inflation Device','Weights','Vacuum Tension','Skin Cone Retaining','Dual Inflation']}
];
const ACHS=[
  {id:'first',icon:'⚔',title:'First Step',desc:'Log your first session',check:c=>c.sessions>=1},
  {id:'str3',icon:'🔥',title:'On Fire',desc:'3-day streak',check:c=>c.streak>=3},
  {id:'str7',icon:'🌟',title:'Week Warrior',desc:'7-day streak',check:c=>c.streak>=7},
  {id:'str30',icon:'👑',title:'Month Champion',desc:'30-day streak',check:c=>c.streak>=30},
  {id:'goal5',icon:'🎯',title:'Goal Getter',desc:'Hit daily goal 5 times',check:c=>c.goalDays>=5},
  {id:'goal20',icon:'💎',title:'Consistent',desc:'Hit daily goal 20 times',check:c=>c.goalDays>=20},
  {id:'s10',icon:'📜',title:'Committed',desc:'10 sessions',check:c=>c.sessions>=10},
  {id:'s50',icon:'🛡',title:'Veteran',desc:'50 sessions',check:c=>c.sessions>=50},
  {id:'s100',icon:'⚜',title:'Legend',desc:'100 sessions',check:c=>c.sessions>=100},
  {id:'h10',icon:'⏳',title:'Ten Hours',desc:'10 total hours',check:c=>c.minutes>=600},
  {id:'h50',icon:'💪',title:'Dedicated',desc:'50 total hours',check:c=>c.minutes>=3000},
  {id:'h100',icon:'🏆',title:'Century',desc:'100 total hours',check:c=>c.minutes>=6000},
  {id:'m3',icon:'🧪',title:'Explorer',desc:'Try 3 methods',check:c=>c.methods.length>=3},
  {id:'m5',icon:'🔬',title:'Methodical',desc:'Try 5 methods',check:c=>c.methods.length>=5},
  {id:'lv5',icon:'⭐',title:'Halfway There',desc:'Reach Level 5',check:c=>getLv(c.xp)>=5},
  {id:'lv10',icon:'🌈',title:'The Restored',desc:'Complete the journey',check:c=>getLv(c.xp)>=10}
];
const THEMES=[
  {id:'shadow',name:'Shadow',bg:'#0D0B14',accent:'#C9A84C',text:'#E2DDD0',mid:'#3d2a00'},
  {id:'ivory',name:'Ivory',bg:'#F0EDE6',accent:'#7A5C10',text:'#1a1710',mid:'#C8A848'},
  {id:'forest',name:'Forest',bg:'#0A1409',accent:'#4CAF50',text:'#D0EDD0',mid:'#2d5c10'},
  {id:'ocean',name:'Ocean',bg:'#050D18',accent:'#38B4D4',text:'#C8E8F5',mid:'#0a4070'},
  {id:'neon',name:'Neon',bg:'#07060E',accent:'#DC00FF',text:'#F0E5FF',mid:'#6600AA'}
];
const QUOTES=[
  "Every tug is a step toward wholeness.",
  "Progress is measured in millimeters and months, not days.",
  "You are restoring what was taken. That is strength.",
  "Consistency beats intensity every time.",
  "The body remembers how to grow.",
  "There are thousands walking this path with you.",
  "Slow and steady wins the long game.",
  "Your patience today is your progress tomorrow.",
  "Tension plus time equals growth.",
  "Every session counts, even the short ones.",
  "You started. That alone puts you ahead.",
  "The skin that grows is a testament to your dedication.",
  "Rest is part of the process too.",
  "Trust the process. The results follow.",
  "One more set. One more day. One more CI level.",
  "What you restore, no one can take again.",
  "The community walks with you.",
  "Small efforts, compounded daily, become transformation.",
  "You're not just restoring skin — you're reclaiming autonomy.",
  "Keep on tugging. Every rep matters.",
  "Your body is on your side.",
  "Months from now you'll be glad you started today.",
  "Every restorer started at CI-0. Every one.",
  "The marathon runner doesn't sprint every mile.",
  "Dedication is showing up even on the hard days."
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let profiles=[],currentPid=null,currentTheme='shadow';
let char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0,theme:'shadow'};
let logs=[],photos=[];
let tab='today';
let activeTimer=null,timerInterval=null,timerSecs=0;
let showProfileScreen=false,showSessionSheet=false,showStopSheet=false;
let logMode='timer',manualHrs=0,manualMins=0;
let sheetCat=null,sheetMethod='',sheetNotes='';
let viewingPhoto=null;
let photoAddCI=null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const getLv=xp=>{for(let i=XP_TABLE.length-1;i>=0;i--)if(xp>=XP_TABLE[i])return i;return 0};
const getProg=xp=>{const lv=getLv(xp);if(lv>=10)return{cur:0,need:0,pct:100};const s=XP_TABLE[lv],e=XP_TABLE[lv+1];return{cur:xp-s,need:e-s,pct:Math.round(((xp-s)/(e-s))*100)}};
const fmtHMS=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`};
const fmtMin=m=>{if(m<=0)return'0m';if(m<60)return m+'m';const h=Math.floor(m/60),r=m%60;return r?`${h}h ${r}m`:`${h}h`};
const today=()=>new Date().toISOString().split('T')[0];
const todayLogs=()=>logs.filter(l=>l.date===today());
const todayMin=()=>todayLogs().reduce((a,l)=>a+l.dur,0);
const thisWeekDays=()=>{const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;};
const dayLbl=d=>['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(d+'T12:00:00').getDay()];
const catFor=id=>CATS.find(c=>c.id===id)||{icon:'?',color:'#888',mult:1,label:''};
const dailyQuote=()=>QUOTES[Math.floor((new Date().getDate()*13+new Date().getMonth()*7)%QUOTES.length)];

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del(k){try{localStorage.removeItem(k);}catch{}}
};
function loadAll(){
  profiles=S.get('rst-profiles')||[];
  currentPid=S.get('rst-active-pid');
  if(currentPid&&profiles.find(p=>p.id===currentPid)){loadProfile(currentPid);}
  else if(profiles.length>0){currentPid=profiles[0].id;S.set('rst-active-pid',currentPid);loadProfile(currentPid);}
  else{showProfileScreen=true;}
}
function loadProfile(pid){
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0,theme:'shadow'};
  logs=[];photos=[];
  const c=S.get(`rst-${pid}-char`);if(c)char={...char,...c};
  const l=S.get(`rst-${pid}-logs`);if(l)logs=l;
  const p=S.get(`rst-${pid}-photos`);if(p)photos=p;
  currentTheme=char.theme||'shadow';applyTheme(currentTheme);
  const t=S.get(`rst-${pid}-timer`);
  if(t&&t.startedAt){
    activeTimer=t;timerSecs=Math.floor((Date.now()-t.startedAt)/1000)+(t.elapsedOnPause||0);
    sheetMethod=t.method||'';sheetCat=t.cat||null;sheetNotes=t.notes||'';
    startInterval();
  }
}
function saveChar(){if(!currentPid)return;S.set(`rst-${currentPid}-char`,char);}
function saveLogs(){if(!currentPid)return;S.set(`rst-${currentPid}-logs`,logs);}
function savePhotos(){if(!currentPid)return;S.set(`rst-${currentPid}-photos`,photos);}
function saveTimer(t){if(!currentPid)return;t?S.set(`rst-${currentPid}-timer`,t):S.del(`rst-${currentPid}-timer`);}
function saveProfiles(){S.set('rst-profiles',profiles);}

// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(id){document.documentElement.setAttribute('data-theme',id||'shadow');}
function selectTheme(id){
  currentTheme=id;applyTheme(id);char.theme=id;
  if(currentPid)saveChar();
  document.querySelectorAll('.theme-chip').forEach(el=>el.classList.toggle('sel',el.dataset.tid===id));
}

// ─── PROFILE OPS ─────────────────────────────────────────────────────────────
function createProfile(name){
  const id='p'+Date.now();profiles.push({id,name,createdAt:today()});saveProfiles();currentPid=id;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name,dailyGoalMin:120,goalDays:0,theme:currentTheme};
  logs=[];photos=[];S.set('rst-active-pid',id);saveChar();
  showProfileScreen=false;tab='today';render();
}
function switchProfile(pid){
  currentPid=pid;stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0,theme:'shadow'};
  logs=[];photos=[];loadProfile(pid);S.set('rst-active-pid',pid);
  showProfileScreen=false;tab='today';render();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startInterval(){
  stopInterval();
  timerInterval=setInterval(()=>{
    if(!activeTimer)return;
    timerSecs=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
    const el=document.getElementById('mc-run-time');if(el)el.textContent=fmtHMS(timerSecs);
    const si=document.getElementById('sheet-timer');if(si)si.textContent=fmtHMS(timerSecs);
    const xi=document.getElementById('sheet-xp');if(xi){const cat=catFor(activeTimer.cat);xi.textContent='+'+(Math.round((timerSecs/60)*cat.mult))+' XP';}
  },1000);
}
function stopInterval(){clearInterval(timerInterval);timerInterval=null;}
function beginSession(){
  if(!sheetMethod||!sheetCat)return;
  activeTimer={startedAt:Date.now(),method:sheetMethod,cat:sheetCat,notes:sheetNotes,elapsedOnPause:0};
  timerSecs=0;saveTimer(activeTimer);startInterval();showSessionSheet=false;render();
}
function stopSession(){
  if(!activeTimer)return;stopInterval();
  const elapsed=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
  timerSecs=elapsed;activeTimer={...activeTimer,startedAt:null,elapsedOnPause:elapsed};
  saveTimer(activeTimer);showStopSheet=true;render();
}
function resumeSession(){
  if(!activeTimer)return;
  activeTimer={...activeTimer,startedAt:Date.now(),elapsedOnPause:timerSecs};
  saveTimer(activeTimer);startInterval();showStopSheet=false;render();
}
function commitSession(notes){
  const finalMins=Math.max(1,Math.round(timerSecs/60));
  const cat=catFor(activeTimer?activeTimer.cat:sheetCat);
  const method=activeTimer?activeTimer.method:sheetMethod;
  const catId=activeTimer?activeTimer.cat:sheetCat;
  awardSession(method,catId,finalMins,Math.round(finalMins*cat.mult),notes||sheetNotes||'');
  stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;sheetNotes='';
  saveTimer(null);showStopSheet=false;render();
}
function logManual(method,catId,hrs,mins,notes){
  const totalMins=(hrs*60)+mins;if(totalMins<=0)return;
  const cat=catFor(catId);
  awardSession(method,catId,totalMins,Math.round(totalMins*cat.mult),notes||'');
  showSessionSheet=false;render();
}
function awardSession(method,catId,totalMins,xp,notes){
  const td=today();
  let ns=char.streak;
  if(char.lastDate){const diff=Math.round((new Date(td)-new Date(char.lastDate))/86400000);if(diff===1)ns++;else if(diff>1)ns=1;}else ns=1;
  const prevTodayMin=todayMin();
  const nm=char.methods.includes(method)?char.methods:[...char.methods,method];
  let ngd=char.goalDays;
  if(prevTodayMin<char.dailyGoalMin&&(prevTodayMin+totalMins)>=char.dailyGoalMin)ngd++;
  const prevXP=char.xp;
  char={...char,xp:char.xp+xp,sessions:char.sessions+1,minutes:char.minutes+totalMins,streak:ns,lastDate:td,methods:nm,goalDays:ngd};
  const newly=[];
  for(const a of ACHS)if(!char.achievements.includes(a.id)&&a.check(char)){char.achievements=[...char.achievements,a.id];newly.push(a.title);}
  logs=[{id:Date.now(),date:td,method,cat:catId,dur:totalMins,notes,xp},...logs];
  saveChar();saveLogs();
  showXPFlash('+'+xp+' XP');
  const prevLv=getLv(prevXP),newLv=getLv(char.xp);
  if(newLv>prevLv)showToast(`⚔ LEVEL UP!\n${LEVELS[newLv].rank}\n${LEVELS[newLv].ci}`);
  else if(newly.length)showToast('🏆 '+newly[0]+'!');
  else showToast(`+${xp} XP earned!\n${fmtMin(totalMins)} logged`);
}

// ─── PHOTOS ───────────────────────────────────────────────────────────────────
function addPhoto(ciLevel,dataUrl,note){
  photos=[{id:Date.now(),ci:ciLevel,date:today(),url:dataUrl,note:note||''},...photos];
  savePhotos();showToast('📸 Photo saved!');tab='photos';render();
}
function deletePhoto(id){photos=photos.filter(p=>p.id!==id);savePhotos();render();}
function openPhotoViewer(photo){
  viewingPhoto=photo;
  const el=document.createElement('div');el.className='photo-viewer';el.id='photo-view';
  el.innerHTML=`
    <img src="${photo.url}" alt="Progress photo">
    <div style="margin-top:12px;text-align:center">
      <div style="font-family:Cinzel,serif;font-size:14px;color:var(--accent)">${photo.ci}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:3px">${photo.date}</div>
      ${photo.note?`<div style="font-size:12px;color:var(--text2);margin-top:6px;font-style:italic">${photo.note}</div>`:''}
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-ghost" onclick="document.getElementById('photo-view').remove();viewingPhoto=null" style="flex:1">Close</button>
      <button class="del-btn" onclick="deletePhoto(${photo.id});document.getElementById('photo-view').remove()" style="padding:10px 18px;font-size:13px">Delete</button>
    </div>`;
  document.getElementById('root').appendChild(el);
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Date','Method','Category','Duration (min)','XP','Notes']];
  logs.forEach(l=>{
    const cat=catFor(l.cat);
    rows.push([l.date,l.method,cat.label,l.dur,l.xp,(l.notes||'').replace(/,/g,' ')]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`restoration-log-${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('📊 CSV exported!');
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500);}
function showXPFlash(msg){const el=document.createElement('div');el.className='xp-flash';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),950);}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  if(showProfileScreen){renderProfileScreen();return;}
  const lv=getLv(char.xp);
  document.getElementById('root').innerHTML=`<div class="app">
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="hdr-title">⚔ FORESKIN RPG</div>
        <div class="lv-pill">LV ${lv}</div>
      </div>
      <button class="profile-btn" id="pbtn">👤 ${char.name} ▾</button>
    </div>
    <div class="content" id="content"></div>
    <div class="nav">${renderNav()}</div>
  </div>`;
  document.getElementById('pbtn').onclick=()=>{showProfileScreen=true;render();};
  document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  const c=document.getElementById('content');
  if(tab==='today')c.innerHTML=renderToday();
  else if(tab==='char')c.innerHTML=renderChar();
  else if(tab==='reports')c.innerHTML=renderReports();
  else if(tab==='ach')c.innerHTML=renderAch();
  else if(tab==='photos')c.innerHTML=renderPhotos();
  attachEvents();
  if(showSessionSheet)mountSheet();
  else if(showStopSheet)mountStopSheet();
}
function renderNav(){
  return[
    {id:'today',icon:'☀',lbl:'Today'},
    {id:'char',icon:'⚔',lbl:'Character'},
    {id:'photos',icon:'📸',lbl:'Progress'},
    {id:'reports',icon:'◉',lbl:'Reports'},
    {id:'ach',icon:'★',lbl:'Feats'}
  ].map(t=>`<button class="nav-btn${tab===t.id?' active':''}" data-tab="${t.id}"><span class="nav-icon">${t.icon}</span>${t.lbl}</button>`).join('');
}

// ─── TODAY ────────────────────────────────────────────────────────────────────
function renderToday(){
  const td=today(),tMin=todayMin(),goal=char.dailyGoalMin||120;
  const goalPct=Math.min(100,Math.round((tMin/goal)*100));
  const lv=getLv(char.xp);
  const monthMin=logs.filter(l=>l.date.slice(0,7)===td.slice(0,7)).reduce((a,l)=>a+l.dur,0);
  const yearMin=logs.filter(l=>l.date.slice(0,4)===td.slice(0,4)).reduce((a,l)=>a+l.dur,0);
  const tSess=todayLogs();
  const isRunning=!!activeTimer&&!!activeTimer.startedAt;
  const isPaused=!!activeTimer&&!activeTimer.startedAt;
  const timerBlock=isRunning?`<div class="card" style="border-color:rgba(34,168,90,.3);background:rgba(34,168,90,.04);margin-bottom:9px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="live-dot"></div>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:#22a85a">Session Active</div>
      <div style="font-size:10px;color:var(--text4);margin-top:1px">${activeTimer.method}</div></div>
      <div style="font-family:Cinzel,serif;font-size:20px;font-weight:700;color:#22a85a" id="mc-run-time">${fmtHMS(timerSecs)}</div>
    </div>
    <button id="stop-btn" class="btn-red" style="margin:0;padding:10px;font-size:13px">⏹ Stop Session</button>
  </div>`:isPaused?`<div class="card" style="border-color:var(--acc30);margin-bottom:9px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:16px">⏸</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--accent)">Session Paused</div>
      <div style="font-size:10px;color:var(--text4);margin-top:1px">${activeTimer.method} · ${fmtHMS(timerSecs)}</div></div>
    </div>
    <div style="display:flex;gap:7px">
      <button id="resume-btn" class="btn-green" style="margin:0;padding:10px;font-size:13px;flex:1">▶ Resume</button>
      <button id="stop-btn" class="btn-red" style="margin:0;padding:10px;font-size:13px;flex:1">⏹ Save</button>
    </div>
  </div>`:'';
  const sessHtml=tSess.length?tSess.map(l=>{const cat=catFor(l.cat);return`
    <div style="display:flex;gap:10px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--stat-border);border-radius:10px;padding:10px;margin-bottom:7px">
      <div style="width:34px;height:34px;border-radius:8px;background:${cat.color}18;border:1px solid ${cat.color}33;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${cat.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.method}</div>

// ─── CHARACTER ────────────────────────────────────────────────────────────────

    const right=active?`<span style="color:var(--accent);font-size:12px">▶</span>`:done?`<span style="color:var(--lv-done);font-size:11px">✓</span>`:`<span style="font-size:9px;color:var(--lv-fut)">${(XP_TABLE[i]-char.xp).toLocaleString()} XP</span>`;
    return`<div class="lrow"><div class="lcirc ${cc}">${i}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:500;color:${active?'var(--accent)':done?'var(--text3)':'var(--lv-fut)'}">${l.rank}</div>
      <div style="font-size:9px;color:${done?'var(--text4)':'var(--lv-fut)'};margin-top:1px">${l.ci} · ${l.title}</div></div>${right}</div>`;

    <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
    <div class="total-row"><span style="color:var(--text4)">Total XP</span><span style="font-weight:700;color:var(--accent)">${char.xp.toLocaleString()} XP</span></div>
  </div>

    <div class="ci-badge">${l.ci}</div>
    <div style="flex:1"><div style="font-size:11px;font-weight:600;color:${i===getLv(char.xp)?'var(--accent)':'var(--text3)'}">${l.rank}</div>

// ─── PROGRESS PHOTOS ─────────────────────────────────────────────────────────
function renderPhotos(){
  const byCI={};
  photos.forEach(p=>{if(!byCI[p.ci])byCI[p.ci]=[];byCI[p.ci].push(p);});
  const ciGroups=Object.keys(byCI).sort((a,b)=>{
    const na=parseInt(a.replace('CI-','')),nb=parseInt(b.replace('CI-',''));return na-nb;
  });
  const groupsHtml=ciGroups.length?ciGroups.map(ci=>{
    const thumbs=byCI[ci].map(p=>`
      <div class="photo-thumb" onclick="openPhotoViewer(photos.find(x=>x.id===${p.id}))">
        <img src="${p.url}" alt="${ci}">
      </div>`).join('');
    return`<div class="sec-title">${ci} — ${LEVELS[parseInt(ci.replace('CI-',''))].rank}</div>
    <div class="photo-grid">${thumbs}</div>`;
  }).join(''):`<div class="empty">No progress photos yet.<br>Add your first one below!</div>`;
  return`
  <div class="page-title">Progress Photos</div>
  <div class="page-sub">Visual evidence of your journey — grouped by CI level.</div>
  ${groupsHtml}
  <div class="sec-title">Add Photo</div>
  <div class="card">
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Select your current CI level:</div>
    <div class="ci-select-grid" id="ci-sel-grid">
      ${LEVELS.map((l,i)=>`<div class="ci-sel-btn${photoAddCI===l.ci?' active':''}" data-ci="${l.ci}" onclick="photoAddCI='${l.ci}';document.querySelectorAll('.ci-sel-btn').forEach(b=>b.classList.toggle('active',b.dataset.ci==='${l.ci}'))">${l.ci}</div>`).join('')}

// ─── REPORTS ─────────────────────────────────────────────────────────────────
function renderReports(){
  const wDays=thisWeekDays(),wMins=wDays.map(d=>logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0));
  const maxM=Math.max(...wMins,1);
  const bars=wMins.map((m,i)=>{const h=Math.max(2,Math.round((m/maxM)*88)),isT=wDays[i]===today();
    return`<div class="bar-col"><div class="bar-val">${m>0?fmtMin(m):''}</div>
    <div class="bar${isT?' today':''}" style="height:${h}px"></div>
    <div class="bar-lbl" style="color:${isT?'var(--accent)':'var(--text4)'}">${dayLbl(wDays[i])}</div></div>`;
  }).join('');
  const catTotals=CATS.map(c=>({...c,total:logs.filter(l=>l.cat===c.id).reduce((a,l)=>a+l.dur,0)}));
  const totM=catTotals.reduce((a,c)=>a+c.total,0)||1;
  const catBars=catTotals.map(c=>{const p=Math.round((c.total/totM)*100);
    return`<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:var(--text2)">${c.icon} ${c.label}</span><span style="color:${c.color}">${fmtMin(c.total)} (${p}%)</span>
      </div>
      <div style="height:7px;background:var(--bg-stat);border-radius:4px;overflow:hidden">
        <div style="height:100%;border-radius:4px;background:${c.color};width:${p}%;transition:width .6s"></div>
      </div>
    </div>`;
  }).join('');
  const cal35=[];for(let i=34;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);cal35.push(d.toISOString().split('T')[0]);}
  const activeDays=new Set(logs.map(l=>l.date));
  const goalDaysSet=new Set();
  cal35.forEach(d=>{if(logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0)>=(char.dailyGoalMin||120))goalDaysSet.add(d);});
  const calDots=cal35.map(d=>`<div class="cal-dot${goalDaysSet.has(d)?' goal':activeDays.has(d)?' on':''}${d===today()?' now':''}"></div>`).join('');
  const weekTotal=wMins.reduce((a,m)=>a+m,0);
  const monthTotal=logs.filter(l=>l.date.slice(0,7)===today().slice(0,7)).reduce((a,l)=>a+l.dur,0);
  const histHtml=logs.length?logs.slice(0,40).map(l=>{const cat=catFor(l.cat);return`
    <div style="display:flex;gap:10px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--stat-border);border-radius:10px;padding:10px;margin-bottom:7px">
      <div style="width:32px;height:32px;border-radius:7px;background:${cat.color}18;border:1px solid ${cat.color}33;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${cat.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.method}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:1px">${l.date} · ${fmtMin(l.dur)}${l.notes?` · ${l.notes.slice(0,28)}`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        <span style="color:var(--accent);font-weight:700;font-size:12px">+${l.xp}</span>
        <button class="del-btn" data-id="${l.id}">✕</button>
      </div>
    </div>`}).join(''):`<div class="empty">No sessions logged yet.</div>`;
  return`<div class="page-title">Reports</div>
  <div class="page-sub">Your restoration journey at a glance.</div>
  <div class="sg2">
    <div class="stat"><div class="sv" style="font-size:15px">${fmtMin(weekTotal)}</div><div class="sl">This Week</div></div>
    <div class="stat"><div class="sv" style="font-size:15px">${fmtMin(monthTotal)}</div><div class="sl">This Month</div></div>
    <div class="stat"><div class="sv" style="font-size:15px">${(char.minutes/60).toFixed(1)}h</div><div class="sl">All Time</div></div>
    <div class="stat"><div class="sv" style="font-size:15px;color:#F59E0B">${char.streak}</div><div class="sl">Best Streak</div></div>
  </div>
  <div class="sec-title">This Week</div>
  <div class="card"><div class="bar-wrap">${bars}</div></div>
  <div class="sec-title">Activity Calendar (35 days)</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text5);margin-bottom:4px"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
    <div class="cal-grid">${calDots}</div>
    <div style="display:flex;gap:10px;margin-top:7px;font-size:9px;color:var(--text4);flex-wrap:wrap">
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--acc45);vertical-align:middle;margin-right:3px"></span>Active</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:rgba(34,168,90,.55);vertical-align:middle;margin-right:3px"></span>Goal met</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:transparent;border:1.5px solid var(--accent);vertical-align:middle;margin-right:3px"></span>Today</span>
    </div>
  </div>
  <div class="sec-title">Method Breakdown</div>
  <div class="card">${catBars||`<div style="color:var(--text5);font-size:11px;text-align:center;padding:10px">No sessions yet.</div>`}</div>
  <div class="sec-title">Export Data</div>
  <div class="card" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--text1)">Download Session Log</div>
      <div style="font-size:10px;color:var(--text4);margin-top:2px">${logs.length} sessions · CSV format</div>
    </div>
    <button class="btn-outline" id="export-btn">📊 Export CSV</button>
  </div>
  <div class="sec-title">Session History</div>${histHtml}`;
}

// ─── SESSION SHEET ────────────────────────────────────────────────────────────
function mountSheet(){
  const ex=document.getElementById('sov');if(ex)ex.remove();
  const cat=CATS.find(c=>c.id===sheetCat);
  const catBtns=CATS.map(c=>`<div class="cat-btn${sheetCat===c.id?' active':''}" data-cat="${c.id}"
    style="${sheetCat===c.id?`border-color:${c.color};background:${c.color}15`:''}"
    onclick="sheetCat=this.dataset.cat;sheetMethod='';refreshSheet()">
    <div style="font-size:19px;margin-bottom:3px">${c.icon}</div>
    <div style="font-size:11px;font-weight:600;color:var(--text2)">${c.label}</div>
    <div style="font-size:9px;color:var(--text4)">${c.mult}x XP</div>
  </div>`).join('');
  const methList=cat?cat.methods.map(m=>`<button class="meth-btn${sheetMethod===m?' active':''}"
    onclick="sheetMethod=this.dataset.m;refreshSheet()" data-m="${m}">${sheetMethod===m?'▶ ':''}${m}</button>`).join(''):'';
  const isTimer=logMode==='timer';const canGo=!!(sheetMethod&&sheetCat);
  const el=document.createElement('div');el.className='overlay';el.id='sov';
  el.innerHTML=`<div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-family:Cinzel,serif;font-size:14px;color:var(--accent);margin-bottom:12px">New Session</div>
    <div class="mode-row">
      <div class="mode-pill${logMode==='timer'?' active':''}" id="mp-timer">▶ Timer</div>
      <div class="mode-pill${logMode==='manual'?' active':''}" id="mp-manual">✏ Log Past Time</div>
    </div>
    <div class="sec-title" style="margin-top:4px">Method Category</div>
    <div class="cat-grid">${catBtns}</div>
    ${cat?`<div class="sec-title">Select Method</div><div class="card" style="max-height:190px;overflow-y:auto">${methList}</div>`:''}
    ${!isTimer?`<div class="sec-title">How long?</div>
    <div class="card" style="text-align:center">
      <div class="time-entry">
        <div><input class="time-inp" id="m-hrs" type="number" min="0" max="24" value="${manualHrs}"><div class="time-lbl">hrs</div></div>
        <div class="time-sep">:</div>
        <div><input class="time-inp" id="m-mins" type="number" min="0" max="59" value="${manualMins}"><div class="time-lbl">min</div></div>
      </div>
      ${canGo?`<div class="xp-tag">+${Math.round(((manualHrs*60)+manualMins)*(cat?.mult||1))} XP</div>`:''}
    </div>`:''}
    <div class="sec-title">Notes (Optional)</div>
    <textarea id="s-notes" placeholder="Comfort, method feedback...">${sheetNotes}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-ghost" id="s-cancel" style="flex:0 0 76px">Cancel</button>
      <div style="flex:1">${isTimer
        ?`<button class="btn-green" id="s-start" style="margin:0" ${!canGo?'disabled':''}>▶ Start Timer</button>`
        :`<button class="btn-gold" id="s-log" ${!canGo?'disabled':''}>⚔ Log &amp; Claim XP</button>`
      }</div>
    </div>
  </div>`;
  document.getElementById('root').appendChild(el);
  document.getElementById('mp-timer').onclick=()=>{logMode='timer';refreshSheet();};
  document.getElementById('mp-manual').onclick=()=>{logMode='manual';refreshSheet();};
  document.getElementById('s-cancel').onclick=()=>{showSessionSheet=false;render();};
  document.getElementById('s-notes')?.addEventListener('input',e=>sheetNotes=e.target.value);
  document.getElementById('m-hrs')?.addEventListener('input',e=>{manualHrs=Math.max(0,Math.min(24,+e.target.value||0));refreshSheet();});
  document.getElementById('m-mins')?.addEventListener('input',e=>{manualMins=Math.max(0,Math.min(59,+e.target.value||0));refreshSheet();});
  document.getElementById('s-start')?.addEventListener('click',()=>{sheetNotes=document.getElementById('s-notes')?.value||'';beginSession();});
  document.getElementById('s-log')?.addEventListener('click',()=>{sheetNotes=document.getElementById('s-notes')?.value||'';logManual(sheetMethod,sheetCat,manualHrs,manualMins,sheetNotes);});
}
function refreshSheet(){const el=document.getElementById('sov');if(el)el.remove();mountSheet();}

// ─── STOP SHEET ───────────────────────────────────────────────────────────────
function mountStopSheet(){
  const ex=document.getElementById('stop-ov');if(ex)ex.remove();
  const cat=catFor(activeTimer?.cat||sheetCat);
  const mins=Math.max(1,Math.round(timerSecs/60));
  const xp=Math.round(mins*cat.mult);
  const el=document.createElement('div');el.className='overlay';el.id='stop-ov';
  el.innerHTML=`<div class="sheet">
    <div class="sheet-handle"></div>
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-family:Cinzel,serif;font-size:12px;color:var(--text4);margin-bottom:6px">Session Complete</div>
      <div class="big-timer">${fmtHMS(timerSecs)}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${activeTimer?.method||sheetMethod}</div>
      <div class="xp-tag">+${xp} XP</div>
    </div>
    <div class="sec-title">Notes (Optional)</div>
    <textarea id="stop-notes" placeholder="Comfort, observations, feedback...">${sheetNotes}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-ghost" id="stop-resume">↺ Resume</button>
      <button class="btn-gold" id="stop-save" style="flex:1">⚔ Claim ${xp} XP</button>
    </div>
  </div>`;
  document.getElementById('root').appendChild(el);
  document.getElementById('stop-resume').onclick=resumeSession;
  document.getElementById('stop-save').onclick=()=>{commitSession(document.getElementById('stop-notes')?.value||'');};
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
let pendingPhotoData=null;
function attachEvents(){
  document.getElementById('start-session-btn')?.addEventListener('click',()=>{showSessionSheet=true;logMode='timer';sheetCat=null;sheetMethod='';sheetNotes='';render();});
  document.getElementById('log-past-btn')?.addEventListener('click',()=>{showSessionSheet=true;logMode='manual';sheetCat=null;sheetMethod='';sheetNotes='';manualHrs=0;manualMins=0;render();});
  document.getElementById('stop-btn')?.addEventListener('click',stopSession);
  document.getElementById('resume-btn')?.addEventListener('click',resumeSession);
  document.getElementById('goal-inp')?.addEventListener('change',e=>{char.dailyGoalMin=Math.max(5,Math.min(1440,+e.target.value||120));saveChar();render();});
  document.getElementById('export-btn')?.addEventListener('click',exportCSV);
  // photo file input
  const pf=document.getElementById('photo-file');
  if(pf){
    pf.addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        pendingPhotoData=ev.target.result;
        const btn=document.getElementById('save-photo-btn');
        if(btn)btn.disabled=!photoAddCI;
      };
      reader.readAsDataURL(file);
    });
  }
  document.getElementById('save-photo-btn')?.addEventListener('click',()=>{
    if(!pendingPhotoData||!photoAddCI)return;
    const note=document.getElementById('photo-note')?.value||'';
    addPhoto(photoAddCI,pendingPhotoData,note);
    pendingPhotoData=null;photoAddCI=null;
  });
  document.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const id=+b.dataset.id;const entry=logs.find(l=>l.id===id);
    if(entry){char.xp=Math.max(0,char.xp-entry.xp);char.sessions=Math.max(0,char.sessions-1);char.minutes=Math.max(0,char.minutes-entry.dur);}
    logs=logs.filter(l=>l.id!==id);saveChar();saveLogs();render();
  }));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAll();render();
</script>
</body>
</html>
