<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Foreskin Restoration RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0B14;color:#E2DDD0;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2535;border-radius:2px}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:70px}
/* header */
.hdr{background:linear-gradient(180deg,#1a1628,#130F1E);border-bottom:1px solid rgba(201,168,76,.25);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr-title{font-family:'Cinzel',serif;font-size:14px;color:#C9A84C;letter-spacing:2px}
.lv-pill{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#C9A84C;font-family:'Cinzel',serif}
.profile-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 11px;font-size:11px;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.profile-btn:hover{border-color:rgba(201,168,76,.3);color:#C9A84C}
/* layout */
.content{padding:12px;flex:1}
/* cards */
.card{background:rgba(22,18,34,.97);border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:12px;margin-bottom:9px}
.card-gold{border-color:rgba(201,168,76,.3);background:linear-gradient(135deg,rgba(22,18,34,.98),rgba(16,12,28,.98))}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#444;margin:12px 0 6px}
/* xp bar */
.xp-bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#7a5a10,#C9A84C,#F0D070);transition:width .8s ease}
/* goal bar */
.goal-bar{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;margin:5px 0}
.goal-fill{height:100%;border-radius:5px;transition:width .6s ease}
.goal-fill-ok{background:linear-gradient(90deg,#0f5c2e,#22a85a)}
.goal-fill-warn{background:linear-gradient(90deg,#7a5a10,#C9A84C)}
/* stat grids */
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px 10px}
.sv{font-size:20px;font-weight:700;color:#E2DDD0;line-height:1}
.sl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
/* ladder */
.lrow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.lrow:last-child{border-bottom:none}
.lcirc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'Cinzel',serif}
.la{background:rgba(201,168,76,.18);border:1.5px solid #C9A84C;color:#C9A84C}
.ld{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);color:#7a6030}
.lf{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:#252525}
/* method cards on today tab */
.method-card{background:rgba(22,18,34,.97);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s}
.method-card:hover{border-color:rgba(201,168,76,.25)}
.method-card.running{border-color:#22a85a;background:rgba(34,168,90,.06)}
.mc-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:13px;font-weight:600;color:#E2DDD0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-sub{font-size:10px;color:#555;margin-top:2px}
.mc-timer{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#22a85a;flex-shrink:0}
.mc-timer.stopped{color:#C9A84C}
/* big timer display */
.big-timer{font-size:58px;font-weight:900;font-family:'Cinzel',serif;color:#C9A84C;letter-spacing:3px;text-align:center;line-height:1;margin:8px 0}
.big-timer.running{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
/* action buttons */
.btn-green{background:linear-gradient(135deg,#0f5c2e,#22a85a);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-red{background:linear-gradient(135deg,#5c0f0f,#c0392b);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-gold{background:linear-gradient(135deg,#7a5a10,#C9A84C);border:none;border-radius:10px;padding:13px;color:#1a0e00;font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px;color:#888;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-ghost:hover{background:rgba(255,255,255,.07);color:#aaa}
/* cat grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.cat-btn{background:rgba(255,255,255,.02);border-radius:10px;padding:11px 8px;cursor:pointer;text-align:center;transition:all .2s;border:1px solid rgba(255,255,255,.06)}
.cat-btn.active{background:rgba(201,168,76,.08)}
/* method list */
.meth-btn{display:block;width:100%;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:7px;padding:9px 12px;cursor:pointer;text-align:left;color:#777;font-size:12px;margin-bottom:5px;font-family:'DM Sans',sans-serif;transition:all .15s}
.meth-btn:hover{background:rgba(255,255,255,.04);color:#aaa}
.meth-btn.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4);color:#C9A84C;font-weight:600}
/* notes */
textarea{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 11px;color:#E2DDD0;font-size:12px;width:100%;outline:none;resize:vertical;min-height:55px;font-family:'DM Sans',sans-serif}
textarea::placeholder{color:#333}
textarea:focus{border-color:rgba(201,168,76,.3)}
/* manual time entry */
.time-entry{display:flex;align-items:center;gap:8px;justify-content:center;margin:10px 0}
.time-inp{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:8px 6px;color:#C9A84C;font-size:28px;font-weight:700;font-family:'Cinzel',serif;outline:none;text-align:center;width:72px}
.time-inp:focus{border-color:rgba(201,168,76,.6)}
.time-sep{font-size:28px;font-weight:700;color:#444;font-family:'Cinzel',serif}
.time-lbl{font-size:10px;color:#444;text-align:center;margin-top:2px}
/* charts */
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:100px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{border-radius:3px 3px 0 0;width:100%;background:rgba(201,168,76,.25);min-height:2px;transition:height .5s ease}
.bar.today{background:linear-gradient(180deg,#F0D070,#C9A84C)}
.bar-lbl{font-size:9px;color:#444;text-align:center}
.bar-val{font-size:8px;color:#666;text-align:center;min-height:10px}
/* calendar heatmap */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:4px 0}
.cal-dot{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,.04)}
.cal-dot.on{background:rgba(201,168,76,.45)}
.cal-dot.goal{background:rgba(34,168,90,.5)}
.cal-dot.now{border:1.5px solid rgba(201,168,76,.9)}
/* ci ref */
.ci-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.ci-row:last-child{border-bottom:none}
.ci-badge{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:5px;padding:2px 6px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:#C9A84C;width:44px;text-align:center;flex-shrink:0}
/* achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ach-card{border-radius:10px;padding:12px 9px;text-align:center}
.ach-card.unlocked{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.25)}
.ach-card.locked{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);opacity:.3}
/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0E0C17;border-top:1px solid rgba(201,168,76,.15);display:flex;max-width:480px;margin:0 auto;z-index:20}
.nav-btn{flex:1;padding:8px 0 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;font-family:'DM Sans',sans-serif;color:#333;transition:color .2s}
.nav-btn.active{color:#C9A84C}
.nav-icon{font-size:18px;line-height:1.2}
/* notif toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1e1a30,#27203c);border:1px solid rgba(201,168,76,.5);border-radius:12px;padding:11px 20px;color:#C9A84C;font-weight:600;font-size:13px;z-index:300;white-space:pre-line;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:sd .3s ease}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* xp flash */
.xp-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:#F0D070;text-shadow:0 0 30px rgba(201,168,76,.6);z-index:400;pointer-events:none;animation:xpf .8s ease forwards}
@keyframes xpf{0%{opacity:0;transform:translate(-50%,-60%)}30%{opacity:1;transform:translate(-50%,-50%)}70%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-40%)}}
/* profile screen */
.pscreen{position:fixed;inset:0;background:#0D0B14;z-index:100;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:32px 20px;max-width:480px;margin:0 auto}
.pcard{background:rgba(22,18,34,.98);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:18px;width:100%;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:border-color .2s}
.pcard:hover{border-color:rgba(201,168,76,.5)}
.pcard.active-p{border-color:#C9A84C;background:rgba(201,168,76,.06)}
.pavatar{width:42px;height:42px;border-radius:50%;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#C9A84C;flex-shrink:0}
.gold-inp{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:10px 14px;color:#E2DDD0;font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.gold-inp:focus{border-color:rgba(201,168,76,.6)}
.gold-inp::placeholder{color:#444}
/* misc */
.page-title{font-family:'Cinzel',serif;font-size:14px;color:#C9A84C;margin-bottom:2px}
.page-sub{font-size:11px;color:#444;margin-bottom:12px}
.empty{text-align:center;padding:36px 16px;color:#333;font-size:12px;line-height:2}
.ci-big{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:#C9A84C;line-height:1}
.xp-row{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:3px}
.total-row{margin-top:8px;padding:7px 10px;background:rgba(201,168,76,.05);border-radius:7px;display:flex;justify-content:space-between;font-size:11px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22a85a;animation:blink 1.2s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.del-btn{background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.2);border-radius:6px;padding:3px 8px;color:#a03232;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn:hover{background:rgba(200,50,50,.15)}
.goal-inp{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:4px 8px;color:#C9A84C;font-size:13px;font-weight:700;width:52px;outline:none;text-align:center;font-family:'Cinzel',serif}
/* session popup overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.sheet{background:#12101e;border:1px solid rgba(201,168,76,.2);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 16px}
/* xp preview tag */
.xp-tag{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:4px 12px;font-size:12px;color:#C9A84C;font-weight:600;display:inline-block;margin-top:6px}
/* mode pill */
.mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-pill{flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);cursor:pointer;font-size:12px;font-weight:500;color:#555;font-family:'DM Sans',sans-serif;text-align:center;transition:all .2s}
.mode-pill.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:#C9A84C}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast" style="display:none"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const XP_TABLE=[0,100,300,650,1200,2000,3100,4600,6600,9300,12800];
const LEVELS=[
  {rank:'Neophyte',title:'The Awakening',ci:'CI-0',desc:'The journey begins. No coverage while flaccid.'},
  {rank:'Initiate',title:'First Light',ci:'CI-1',desc:'Skin covers less than half the glans while flaccid.'},
  {rank:'Apprentice',title:'The Emerging',ci:'CI-2',desc:'Skin covers at least half the glans while flaccid.'},
  {rank:'Journeyman',title:'The Deepening',ci:'CI-3',desc:'Skin covers the entire glans while flaccid.'},
  {rank:'Adept',title:'Half the Way',ci:'CI-4',desc:'Skin bunches up visibly beyond the glans while flaccid.'},
  {rank:'Skilled',title:'The Turning',ci:'CI-5',desc:'Skin covers over the glans and beyond — partial rollover.'},
  {rank:'Expert',title:'The Rolling',ci:'CI-6',desc:'Skin rolls over glans easily. Erect coverage begins.'},
  {rank:'Master',title:'Advanced',ci:'CI-7',desc:'Skin covers more than half the glans while erect.'},
  {rank:'Grand Master',title:'Near Complete',ci:'CI-8',desc:'Skin covers glans while erect with a short overhang.'},
  {rank:'Champion',title:'The Final Push',ci:'CI-9',desc:'Generous overhang covers glans completely while erect.'},
  {rank:'The Restored',title:'Journey Complete',ci:'CI-10',desc:'Full coverage flaccid and erect. Journey complete.'}
];
const CATS=[
  {id:'manual',label:'Manual',icon:'✋',mult:1.0,color:'#F59E0B',methods:['CAR 1','CAR 2','CAR 3','Manual Method (MM)','O-Pulling','Two-Point Stretch','BIB Method','Push Method','Three-Finger Pull','Cross Tug','V-Stretch','Squeeze & Pull']},
  {id:'device',label:'Devices',icon:'⚙',mult:0.8,color:'#60A5FA',methods:['DTR (Dual Tension Restorer)','TLC Tugger','HyperRestore','Foreballs','CAT II Q','Stealth Retainer','FiTness Device','PUD','Supercanister','Foreskinned','TugAhoy','Your-Skin Cone','foreGestalt']},
  {id:'tape',label:'Taping',icon:'📐',mult:0.9,color:'#A78BFA',methods:['T-Tape','3M Tegaderm','ROP Tape (Ring of Power)','Medical Tape','Kinesiology Tape','Buddy Tape']},
  {id:'special',label:'Special',icon:'⚡',mult:1.1,color:'#34D399',methods:['Mantor (Inflation)','Air Inflation','Inflation Device','Weights','Vacuum Tension','Skin Cone Retaining','Dual Inflation']}
];
const ACHS=[
  {id:'first',icon:'⚔',title:'First Step',desc:'Log your first session',check:c=>c.sessions>=1},
  {id:'str3',icon:'🔥',title:'On Fire',desc:'3-day streak',check:c=>c.streak>=3},
  {id:'str7',icon:'🌟',title:'Week Warrior',desc:'7-day streak',check:c=>c.streak>=7},
  {id:'str30',icon:'👑',title:'Month Champion',desc:'30-day streak',check:c=>c.streak>=30},
  {id:'goal5',icon:'🎯',title:'Goal Getter',desc:'Hit daily goal 5 times',check:c=>c.goalDays>=5},
  {id:'goal20',icon:'💎',title:'Consistent',desc:'Hit daily goal 20 times',check:c=>c.goalDays>=20},
  {id:'s10',icon:'📜',title:'Committed',desc:'10 sessions',check:c=>c.sessions>=10},
  {id:'s50',icon:'🛡',title:'Veteran',desc:'50 sessions',check:c=>c.sessions>=50},
  {id:'s100',icon:'⚜',title:'Legend',desc:'100 sessions',check:c=>c.sessions>=100},
  {id:'h10',icon:'⏳',title:'Ten Hours',desc:'10 total hours',check:c=>c.minutes>=600},
  {id:'h50',icon:'💪',title:'Dedicated',desc:'50 total hours',check:c=>c.minutes>=3000},
  {id:'h100',icon:'🏆',title:'Century',desc:'100 total hours',check:c=>c.minutes>=6000},
  {id:'m3',icon:'🧪',title:'Explorer',desc:'Try 3 methods',check:c=>c.methods.length>=3},
  {id:'m5',icon:'🔬',title:'Methodical',desc:'Try 5 methods',check:c=>c.methods.length>=5},
  {id:'lv5',icon:'⭐',title:'Halfway There',desc:'Reach Level 5',check:c=>getLv(c.xp)>=5},
  {id:'lv10',icon:'🌈',title:'The Restored',desc:'Complete the journey',check:c=>getLv(c.xp)>=10}
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let profiles=[], currentPid=null;
let char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
let logs=[];
let tab='today';
// timer state
let activeTimer=null; // {startedAt, method, cat, notes, elapsedOnPause}
let timerInterval=null;
let timerSecs=0;
// ui state
let showProfileScreen=false;
let showSessionSheet=false; // sheet for selecting method to start
let logMode='timer'; // 'timer' | 'manual' — on the sheet
let manualHrs=0, manualMins=0;
let sheetCat=null, sheetMethod='', sheetNotes='';
let showStopSheet=false; // sheet shown after stopping timer

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const getLv=xp=>{for(let i=XP_TABLE.length-1;i>=0;i--)if(xp>=XP_TABLE[i])return i;return 0};
const getProg=xp=>{const lv=getLv(xp);if(lv>=10)return{cur:0,need:0,pct:100};const s=XP_TABLE[lv],e=XP_TABLE[lv+1];return{cur:xp-s,need:e-s,pct:Math.round(((xp-s)/(e-s))*100)}};
const fmtHMS=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`};
const fmtMin=m=>{if(m<=0)return '0m';if(m<60)return m+'m';const h=Math.floor(m/60),rm=m%60;return rm?`${h}h ${rm}m`:`${h}h`};
const fmtMinLong=m=>{if(m<=0)return '0 min';const h=Math.floor(m/60),rm=m%60;let s='';if(h)s+=h+'h ';if(rm)s+=rm+'m';return s.trim()||'0m'};
const today=()=>new Date().toISOString().split('T')[0];
const todayLogs=()=>logs.filter(l=>l.date===today());
const todayMin=()=>todayLogs().reduce((a,l)=>a+l.dur,0);
const thisWeekDays=()=>{const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;};
const dayLabel=d=>{return['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(d+'T12:00:00').getDay()]};
const catFor=id=>CATS.find(c=>c.id===id)||{icon:'?',color:'#888',mult:1};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del(k){try{localStorage.removeItem(k);}catch{}}
};

function loadAll(){
  profiles=S.get('rst-profiles')||[];
  currentPid=S.get('rst-active-pid');
  if(currentPid&&profiles.find(p=>p.id===currentPid)){
    loadProfile(currentPid);
  } else if(profiles.length>0){
    currentPid=profiles[0].id;
    S.set('rst-active-pid',currentPid);
    loadProfile(currentPid);
  } else {
    showProfileScreen=true;
  }
}
function loadProfile(pid){
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
  logs=[];
  const c=S.get(`rst-${pid}-char`);if(c)char={...char,...c};
  const l=S.get(`rst-${pid}-logs`);if(l)logs=l;
  // restore background timer
  const t=S.get(`rst-${pid}-timer`);
  if(t&&t.startedAt){
    activeTimer=t;
    timerSecs=Math.floor((Date.now()-t.startedAt)/1000)+(t.elapsedOnPause||0);
    sheetMethod=t.method||'';sheetCat=t.cat||null;sheetNotes=t.notes||'';
    startInterval();
  }
}
function saveChar(){if(!currentPid)return;S.set(`rst-${currentPid}-char`,char);}
function saveLogs(){if(!currentPid)return;S.set(`rst-${currentPid}-logs`,logs);}
function saveTimer(t){if(!currentPid)return;t?S.set(`rst-${currentPid}-timer`,t):S.del(`rst-${currentPid}-timer`);}
function saveProfiles(){S.set('rst-profiles',profiles);}

// ─── PROFILE OPS ─────────────────────────────────────────────────────────────
function createProfile(name){
  const id='p'+Date.now();
  profiles.push({id,name,createdAt:today()});
  saveProfiles();currentPid=id;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name,dailyGoalMin:120,goalDays:0};
  logs=[];S.set('rst-active-pid',id);saveChar();
  showProfileScreen=false;tab='today';render();
}
function switchProfile(pid){
  currentPid=pid;
  stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
  logs=[];
  loadProfile(pid);S.set('rst-active-pid',pid);
  showProfileScreen=false;tab='today';render();
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startInterval(){
  stopInterval();
  timerInterval=setInterval(()=>{
    if(!activeTimer)return;
    timerSecs=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
    // update clock displays wherever they are
    const el=document.getElementById('timer-clock');if(el)el.textContent=fmtHMS(timerSecs);
    const mc=document.getElementById('mc-running-time');if(mc)mc.textContent=fmtHMS(timerSecs);
    const si=document.getElementById('sheet-timer');if(si)si.textContent=fmtHMS(timerSecs);
    const xi=document.getElementById('sheet-xp');if(xi){const cat=catFor(activeTimer.cat);xi.textContent='+'+(Math.round((timerSecs/60)*cat.mult))+' XP';}
  },1000);
}
function stopInterval(){clearInterval(timerInterval);timerInterval=null;}

function beginSession(){
  // called after method selected — starts the live timer
  if(!sheetMethod||!sheetCat)return;
  activeTimer={startedAt:Date.now(),method:sheetMethod,cat:sheetCat,notes:sheetNotes,elapsedOnPause:0};
  timerSecs=0;
  saveTimer(activeTimer);
  startInterval();
  showSessionSheet=false;render();
}

function stopSession(){
  // pause the timer (freeze elapsed) and show stop sheet
  if(!activeTimer)return;
  stopInterval();
  const elapsed=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
  timerSecs=elapsed;
  // save paused state
  activeTimer={...activeTimer,startedAt:null,elapsedOnPause:elapsed};
  saveTimer(activeTimer);
  showStopSheet=true;render();
}

function resumeSession(){
  if(!activeTimer)return;
  // restart the clock from elapsed
  activeTimer={...activeTimer,startedAt:Date.now(),elapsedOnPause:timerSecs};
  saveTimer(activeTimer);
  startInterval();
  showStopSheet=false;render();
}

function commitSession(notes){
  // award XP and log — called from stop sheet confirm
  const finalSecs=timerSecs;
  const finalMins=Math.max(1,Math.round(finalSecs/60));
  const cat=catFor(activeTimer?activeTimer.cat:sheetCat);
  const method=activeTimer?activeTimer.method:sheetMethod;
  const catId=activeTimer?activeTimer.cat:sheetCat;
  const xp=Math.round(finalMins*cat.mult);
  awardSession(method,catId,finalMins,xp,notes||sheetNotes||'');
  stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;sheetNotes='';
  saveTimer(null);showStopSheet=false;render();
}

function logManual(method,catId,hrs,mins,notes){
  const totalMins=(hrs*60)+mins;
  if(totalMins<=0)return;
  const cat=catFor(catId);
  const xp=Math.round(totalMins*cat.mult);
  awardSession(method,catId,totalMins,xp,notes||'');
  showSessionSheet=false;render();
}

function awardSession(method,catId,totalMins,xp,notes){
  const td=today();
  // streak
  let newStreak=char.streak;
  if(char.lastDate){
    const diff=Math.round((new Date(td)-new Date(char.lastDate))/86400000);
    if(diff===1)newStreak++;else if(diff>1)newStreak=1;
  } else newStreak=1;
  const prevTodayMin=todayMin();
  const newMethods=char.methods.includes(method)?char.methods:[...char.methods,method];
  let newGoalDays=char.goalDays;
  if(prevTodayMin<char.dailyGoalMin&&(prevTodayMin+totalMins)>=char.dailyGoalMin)newGoalDays++;
  const prevXP=char.xp;
  char={...char,xp:char.xp+xp,sessions:char.sessions+1,minutes:char.minutes+totalMins,streak:newStreak,lastDate:td,methods:newMethods,goalDays:newGoalDays};
  // check achievements
  const newly=[];
  for(const a of ACHS)if(!char.achievements.includes(a.id)&&a.check(char)){char.achievements=[...char.achievements,a.id];newly.push(a.title);}
  logs=[{id:Date.now(),date:td,method,cat:catId,dur:totalMins,notes,xp},...logs];
  saveChar();saveLogs();
  // xp flash
  showXPFlash('+'+xp+' XP');
  // check level up
  const prevLv=getLv(prevXP),newLv=getLv(char.xp);
  if(newLv>prevLv){showToast(`⚔ LEVEL UP!\n${LEVELS[newLv].rank}\n${LEVELS[newLv].ci}`);}
  else if(newly.length){showToast('🏆 '+newly[0]+'!');}
  else{showToast(`+${xp} XP earned!\n${fmtMin(totalMins)} logged`);}
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500);
}
function showXPFlash(msg){
  const el=document.createElement('div');el.className='xp-flash';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  if(showProfileScreen){renderProfileScreen();return;}
  const lv=getLv(char.xp);
  document.getElementById('root').innerHTML=`<div class="app">
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="hdr-title">⚔ FORESKIN RPG</div>
        <div class="lv-pill">LV ${lv}</div>
      </div>
      <button class="profile-btn" id="pbtn">👤 ${char.name} ▾</button>
    </div>
    <div class="content" id="content"></div>
    <div class="nav" id="nav">${renderNav()}</div>
  </div>`;
  document.getElementById('pbtn').onclick=()=>{showProfileScreen=true;render();};
  document.getElementById('nav').querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  const c=document.getElementById('content');
  if(tab==='today')c.innerHTML=renderToday();
  else if(tab==='char')c.innerHTML=renderChar();
  else if(tab==='reports')c.innerHTML=renderReports();
  else if(tab==='ach')c.innerHTML=renderAch();
  attachEvents();

  else if(showStopSheet)mountStopSheet();
}

  return[{id:'today',icon:'☀',lbl:'Today'},{id:'char',icon:'⚔',lbl:'Character'},{id:'reports',icon:'◉',lbl:'Reports'},{id:'ach',icon:'★',lbl:'Feats'}]
    .map(t=>`<button class="nav-btn${tab===t.id?' active':''}" data-tab="${t.id}"><span class="nav-icon">${t.icon}</span>${t.lbl}</button>`).join('');

  </div>
  <div class="sec-title">Method Breakdown</div>
  <div class="card">${catBars||'<div style="color:#333;font-size:11px;text-align:center;padding:10px">No sessions yet.</div>'}</div>
  <div class="sec-title">Session History</div>
  ${histHtml}`;
}

// ─── ACHIEVEMENTS TAB ─────────────────────────────────────────────────────────
function renderAch(){
  const cards=ACHS.map(a=>{const u=char.achievements.includes(a.id);
    return`<div class="ach-card ${u?'unlocked':'locked'}">
      <div style="font-size:24px;margin-bottom:5px">${a.icon}</div>
      <div style="font-size:11px;font-weight:600;color:${u?'#C9A84C':'#1e1e1e'}">${a.title}</div>
      <div style="font-size:9px;color:${u?'#555':'#222'};margin-top:2px">${a.desc}</div>
    </div>`;
  }).join('');
  return`<div class="page-title">Feats & Achievements</div>
  <div style="font-size:11px;color:#444;margin-bottom:12px">${char.achievements.length} / ${ACHS.length} unlocked</div>
  <div class="ach-grid">${cards}</div>`;
}

// ─── PROFILE SCREEN ───────────────────────────────────────────────────────────
function renderProfileScreen(){
  document.getElementById('root').innerHTML=`<div class="pscreen">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:Cinzel,serif;font-size:22px;color:#C9A84C;letter-spacing:2px;margin-bottom:6px">⚔ FORESKIN RPG</div>
      <div style="font-size:12px;color:#555">Select or create a profile</div>
    </div>
    ${profiles.map(p=>`<div class="pcard${p.id===currentPid?' active-p':''}" data-pid="${p.id}">
      <div class="pavatar">${p.name.charAt(0).toUpperCase()}</div>
      <div><div style="font-weight:600;font-size:14px">${p.name}</div>
      <div style="font-size:10px;color:#555;margin-top:2px">Since ${p.createdAt}</div></div>
    </div>`).join('')}
    <div style="margin:12px 0 10px;font-size:10px;color:#2a2a2a;text-align:center;text-transform:uppercase;letter-spacing:1px">── New Profile ──</div>
    <input class="gold-inp" id="new-name" placeholder="Enter your name..." maxlength="24">
    <button class="btn-gold" id="create-btn">Create Profile</button>
    ${currentPid?`<button id="cancel-p" style="background:none;border:none;color:#333;font-size:12px;margin-top:14px;cursor:pointer;font-family:'DM Sans',sans-serif;display:block;width:100%;text-align:center">Cancel</button>`:''}
  </div>`;
  document.querySelectorAll('.pcard').forEach(el=>el.onclick=()=>switchProfile(el.dataset.pid));
  document.getElementById('create-btn').onclick=()=>{const n=document.getElementById('new-name').value.trim();if(n)createProfile(n);};
  document.getElementById('new-name').onkeydown=e=>{if(e.key==='Enter'){const n=e.target.value.trim();if(n)createProfile(n);}};
  document.getElementById('cancel-p')?.addEventListener('click',()=>{showProfileScreen=false;render();});
}

// ─── SESSION SHEET (start / log past) ────────────────────────────────────────
function mountSheet(){
  const existing=document.getElementById('sheet-overlay');
  if(existing)existing.remove();
  const isTimer=logMode==='timer';
  const cat=CATS.find(c=>c.id===sheetCat);
  const catBtns=CATS.map(c=>`<div class="cat-btn${sheetCat===c.id?' active':''}" data-cat="${c.id}" style="${sheetCat===c.id?`border-color:${c.color};background:${c.color}15`:''}"
    onclick="sheetCat=this.dataset.cat;sheetMethod='';refreshSheet()">
    <div style="font-size:19px;margin-bottom:3px">${c.icon}</div>
    <div style="font-size:11px;font-weight:600">${c.label}</div>
    <div style="font-size:9px;color:#555">${c.mult}x XP</div>
  </div>`).join('');
  const methList=cat?cat.methods.map(m=>`<button class="meth-btn${sheetMethod===m?' active':''}" 
    onclick="sheetMethod=this.dataset.m;refreshSheet()" data-m="${m}">${sheetMethod===m?'▶ ':''}${m}</button>`).join(''):'';
  const xpPreviewMin=isTimer?'time-based':Math.round(((manualHrs*60)+manualMins)*(cat?.mult||1));
  const canStart=sheetMethod&&sheetCat;
  const actionBtn=isTimer
    ?`<button class="btn-green" id="sheet-start-btn" ${!canStart?'disabled style="opacity:.4;cursor:not-allowed"':''}>▶ Start Timer</button>`
    :`<button class="btn-gold" id="sheet-log-btn" ${!canStart?'disabled style="opacity:.4;cursor:not-allowed"':''}>⚔ Log Session & Claim XP</button>`;
  const el=document.createElement('div');
  el.className='overlay';el.id='sheet-overlay';
  el.innerHTML=`<div class="sheet">
    <div class="sheet-handle"></div>
    <div style="font-family:Cinzel,serif;font-size:14px;color:#C9A84C;margin-bottom:12px">New Session</div>
    <div class="mode-row">
      <div class="mode-pill${logMode==='timer'?' active':''}" id="mode-timer">▶ Timer</div>
      <div class="mode-pill${logMode==='manual'?' active':''}" id="mode-manual">✏ Log Past Time</div>
    </div>
    <div class="sec-title" style="margin-top:4px">Method Category</div>
    <div class="cat-grid">${catBtns}</div>
    ${cat?`<div class="sec-title">Select Method</div><div class="card" style="max-height:200px;overflow-y:auto">${methList}</div>`:''}
    ${isTimer?'':`
    <div class="sec-title">How long did you go?</div>
    <div class="card" style="text-align:center">
      <div class="time-entry">
        <div><input class="time-inp" id="m-hrs" type="number" min="0" max="24" value="${manualHrs}" placeholder="0"><div class="time-lbl">hrs</div></div>
        <div class="time-sep">:</div>
        <div><input class="time-inp" id="m-mins" type="number" min="0" max="59" value="${manualMins}" placeholder="0"><div class="time-lbl">min</div></div>
      </div>
      ${canStart?`<div class="xp-tag">+${Math.round(((manualHrs*60)+manualMins)*(cat?.mult||1))} XP</div>`:''}
    </div>`}
    <div class="sec-title">Notes (Optional)</div>
    <textarea id="sheet-notes" placeholder="Comfort, method feedback, anything...">${sheetNotes}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-ghost" id="sheet-cancel-btn" style="flex:0 0 80px">Cancel</button>
      <div style="flex:1">${actionBtn}</div>
    </div>
  </div>`;
  document.getElementById('root').appendChild(el);
  // mode switch
  document.getElementById('mode-timer').onclick=()=>{logMode='timer';refreshSheet();};
  document.getElementById('mode-manual').onclick=()=>{logMode='manual';refreshSheet();};
  document.getElementById('sheet-cancel-btn').onclick=()=>{showSessionSheet=false;render();};
  document.getElementById('sheet-notes')?.addEventListener('input',e=>sheetNotes=e.target.value);
  document.getElementById('m-hrs')?.addEventListener('input',e=>{manualHrs=Math.max(0,Math.min(24,+e.target.value||0));refreshSheet();});
  document.getElementById('m-mins')?.addEventListener('input',e=>{manualMins=Math.max(0,Math.min(59,+e.target.value||0));refreshSheet();});
  document.getElementById('sheet-start-btn')?.addEventListener('click',()=>{sheetNotes=document.getElementById('sheet-notes')?.value||'';beginSession();});
  document.getElementById('sheet-log-btn')?.addEventListener('click',()=>{
    sheetNotes=document.getElementById('sheet-notes')?.value||'';
    logManual(sheetMethod,sheetCat,manualHrs,manualMins,sheetNotes);
  });
}

function refreshSheet(){
  const el=document.getElementById('sheet-overlay');
  if(el)el.remove();
  mountSheet();
}

// ─── STOP SHEET ───────────────────────────────────────────────────────────────
function mountStopSheet(){
  const existing=document.getElementById('stop-overlay');if(existing)existing.remove();
  const cat=catFor(activeTimer?.cat||sheetCat);
  const mins=Math.max(1,Math.round(timerSecs/60));
  const xp=Math.round(mins*cat.mult);
  const el=document.createElement('div');
  el.className='overlay';el.id='stop-overlay';
  el.innerHTML=`<div class="sheet">
    <div class="sheet-handle"></div>
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-family:Cinzel,serif;font-size:13px;color:#888;margin-bottom:6px">Session Complete</div>
      <div style="font-family:Cinzel,serif;font-size:44px;font-weight:900;color:#C9A84C;letter-spacing:2px">${fmtHMS(timerSecs)}</div>
      <div style="font-size:12px;color:#555;margin-top:4px">${activeTimer?.method||sheetMethod}</div>
      <div class="xp-tag" style="margin-top:8px">+${xp} XP</div>
    </div>
    <div class="sec-title">Notes (Optional)</div>
    <textarea id="stop-notes" placeholder="Comfort, observations, feedback...">${sheetNotes}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-ghost" id="stop-resume-btn">↺ Resume</button>
      <button class="btn-gold" id="stop-save-btn" style="flex:1">⚔ Claim ${xp} XP</button>
    </div>
  </div>`;
  document.getElementById('root').appendChild(el);
  document.getElementById('stop-resume-btn').onclick=resumeSession;
  document.getElementById('stop-save-btn').onclick=()=>{
    const notes=document.getElementById('stop-notes')?.value||'';
    commitSession(notes);
  };
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents(){
  document.getElementById('start-session-btn')?.addEventListener('click',()=>{showSessionSheet=true;logMode='timer';sheetCat=null;sheetMethod='';sheetNotes='';render();});
  document.getElementById('log-past-btn')?.addEventListener('click',()=>{showSessionSheet=true;logMode='manual';sheetCat=null;sheetMethod='';sheetNotes='';manualHrs=0;manualMins=0;render();});
  document.getElementById('stop-btn')?.addEventListener('click',stopSession);
  document.getElementById('goal-inp')?.addEventListener('change',e=>{char.dailyGoalMin=Math.max(5,Math.min(1440,+e.target.value||120));saveChar();render();});
  document.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const id=+b.dataset.id;const entry=logs.find(l=>l.id===id);
    if(entry){char.xp=Math.max(0,char.xp-entry.xp);char.sessions=Math.max(0,char.sessions-1);char.minutes=Math.max(0,char.minutes-entry.dur);}
    logs=logs.filter(l=>l.id!==id);saveChar();saveLogs();render();
  }));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAll();render();
</script>
</body>
