<!DOCTYPE html>
<html data-theme="shadow">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RestoreTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0B14;--bg-card:rgba(22,18,34,.97);--bg-card-gold:linear-gradient(135deg,rgba(22,18,34,.98),rgba(16,12,28,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#0E0C17;--bg-hdr:linear-gradient(180deg,#1a1628,#130F1E);--bg-sheet:#12101e;--bg-ps:#0D0B14;--hdr-border:rgba(201,168,76,.25);--nav-border:rgba(201,168,76,.15);--card-border:rgba(201,168,76,.1);--card-border-gold:rgba(201,168,76,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#C9A84C;--acc6:rgba(201,168,76,.06);--acc12:rgba(201,168,76,.12);--acc18:rgba(201,168,76,.18);--acc30:rgba(201,168,76,.3);--acc45:rgba(201,168,76,.5);--text1:#E2DDD0;--text2:#aaa;--text3:#888;--text4:#555;--text5:#444;--text6:#333;--green:#22a85a;--green-bg:rgba(34,168,90,.06);--green-border:rgba(34,168,90,.3);--scrollbar:#2a2535}
[data-theme="ivory"]{--bg:#F0EDE6;--bg-card:rgba(255,255,255,.97);--bg-card-gold:linear-gradient(135deg,rgba(255,252,244,.99),rgba(245,238,222,.99));--bg-stat:rgba(0,0,0,.04);--bg-nav:#FFF;--bg-hdr:linear-gradient(180deg,#FFF,#F0EDE6);--bg-sheet:#FAFAF7;--bg-ps:#F0EDE6;--hdr-border:rgba(122,92,16,.2);--nav-border:rgba(122,92,16,.12);--card-border:rgba(122,92,16,.15);--card-border-gold:rgba(122,92,16,.3);--stat-border:rgba(0,0,0,.09);--surf-border:rgba(0,0,0,.07);--accent:#7A5C10;--acc6:rgba(122,92,16,.06);--acc12:rgba(122,92,16,.1);--acc18:rgba(122,92,16,.14);--acc30:rgba(122,92,16,.28);--acc45:rgba(122,92,16,.45);--text1:#1a1710;--text2:#5a5040;--text3:#7a6a50;--text4:#9a8a70;--text5:#aaa090;--text6:#bfb8a8;--green:#1a8040;--green-bg:rgba(26,128,64,.06);--green-border:rgba(26,128,64,.3);--scrollbar:#d0cbc4}
[data-theme="forest"]{--bg:#0A1409;--bg-card:rgba(11,22,10,.97);--bg-card-gold:linear-gradient(135deg,rgba(14,28,13,.98),rgba(9,18,8,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#060E05;--bg-hdr:linear-gradient(180deg,#142010,#0A1409);--bg-sheet:#0e1c0d;--bg-ps:#0A1409;--hdr-border:rgba(76,175,80,.25);--nav-border:rgba(76,175,80,.15);--card-border:rgba(76,175,80,.12);--card-border-gold:rgba(76,175,80,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#4CAF50;--acc6:rgba(76,175,80,.06);--acc12:rgba(76,175,80,.12);--acc18:rgba(76,175,80,.18);--acc30:rgba(76,175,80,.3);--acc45:rgba(76,175,80,.5);--text1:#D0EDD0;--text2:#7aaa77;--text3:#5a8855;--text4:#4a7048;--text5:#3a583a;--text6:#2a3e2a;--green:#4CAF50;--green-bg:rgba(76,175,80,.06);--green-border:rgba(76,175,80,.3);--scrollbar:#1a2e1a}
[data-theme="ocean"]{--bg:#050D18;--bg-card:rgba(7,16,34,.97);--bg-card-gold:linear-gradient(135deg,rgba(8,20,42,.98),rgba(5,12,28,.98));--bg-stat:rgba(255,255,255,.03);--bg-nav:#030A12;--bg-hdr:linear-gradient(180deg,#0A1A32,#050D18);--bg-sheet:#081428;--bg-ps:#050D18;--hdr-border:rgba(56,180,212,.25);--nav-border:rgba(56,180,212,.15);--card-border:rgba(56,180,212,.12);--card-border-gold:rgba(56,180,212,.28);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.07);--accent:#38B4D4;--acc6:rgba(56,180,212,.06);--acc12:rgba(56,180,212,.12);--acc18:rgba(56,180,212,.18);--acc30:rgba(56,180,212,.3);--acc45:rgba(56,180,212,.5);--text1:#C8E8F5;--text2:#6898AA;--text3:#4a7888;--text4:#3a6272;--text5:#2e5060;--text6:#22404e;--green:#22b4a0;--green-bg:rgba(34,180,160,.06);--green-border:rgba(34,180,160,.3);--scrollbar:#0d2234}
[data-theme="neon"]{--bg:#07060E;--bg-card:rgba(12,9,22,.97);--bg-card-gold:linear-gradient(135deg,rgba(18,10,32,.98),rgba(10,6,20,.98));--bg-stat:rgba(255,255,255,.025);--bg-nav:#050409;--bg-hdr:linear-gradient(180deg,#10081C,#07060E);--bg-sheet:#0e0a1e;--bg-ps:#07060E;--hdr-border:rgba(220,0,255,.3);--nav-border:rgba(220,0,255,.18);--card-border:rgba(220,0,255,.14);--card-border-gold:rgba(220,0,255,.3);--stat-border:rgba(255,255,255,.06);--surf-border:rgba(255,255,255,.06);--accent:#DC00FF;--acc6:rgba(220,0,255,.06);--acc12:rgba(220,0,255,.12);--acc18:rgba(220,0,255,.2);--acc30:rgba(220,0,255,.32);--acc45:rgba(220,0,255,.55);--text1:#F0E5FF;--text2:#9966CC;--text3:#7744AA;--text4:#5a3388;--text5:#442266;--text6:#331144;--green:#aa00ff;--green-bg:rgba(170,0,255,.06);--green-border:rgba(170,0,255,.3);--scrollbar:#1a0e2a}
[data-theme="neon"] .hdr-title,[data-theme="neon"] .ci-big,[data-theme="neon"] .big-timer{text-shadow:0 0 14px var(--accent),0 0 28px var(--acc18)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text1);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:14px;transition:background .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:70px}
.hdr{background:var(--bg-hdr);border-bottom:1px solid var(--hdr-border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr-title{font-family:'Cinzel',serif;font-size:13px;color:var(--accent);letter-spacing:2px}
.ci-pill{background:var(--acc12);border:1px solid var(--pill-border,var(--acc30));border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:var(--accent);font-family:'Cinzel',serif}
.profile-btn{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.profile-btn:hover{border-color:var(--acc30);color:var(--accent)}
.content{padding:12px;flex:1}
.card{background:var(--bg-card);border:1px solid var(--card-border);border-radius:12px;padding:12px;margin-bottom:9px}
.card-gold{border-color:var(--card-border-gold)!important;background:var(--bg-card-gold)!important}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text4);margin:12px 0 6px}
/* CI RING */
.ci-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px}
.ci-ring-wrap svg{filter:drop-shadow(0 0 6px var(--acc12))}
.ci-set-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.ci-set-btn{background:var(--acc6);border:1px solid var(--acc30);border-radius:20px;padding:5px 16px;font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.ci-set-btn:hover{background:var(--acc12)}
/* COACH CARD */
.coach-card{background:var(--bg-card-gold);border:1px solid var(--card-border-gold);border-radius:12px;padding:14px;margin-bottom:9px}
.coach-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.coach-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:4px;opacity:.8}
.coach-msg{font-size:12px;color:var(--text2);line-height:1.65}
.coach-cta{display:inline-block;margin-top:9px;background:var(--acc12);border:1px solid var(--acc30);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.coach-cta:hover{background:var(--acc18)}
/* BARS & STATS */
.xp-bar{height:8px;background:var(--bg-stat);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc18),var(--accent),var(--acc45));transition:width .8s ease}
.goal-bar{height:10px;background:var(--bg-stat);border-radius:5px;overflow:hidden;margin:5px 0}
.goal-fill{height:100%;border-radius:5px;transition:width .6s ease}
.goal-fill-ok{background:linear-gradient(90deg,#0f5c2e,#22a85a)}
.goal-fill-warn{background:linear-gradient(90deg,var(--acc18),var(--accent))}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.stat{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:10px;padding:9px 10px}
.sv{font-size:20px;font-weight:700;color:var(--text1);line-height:1}
.sl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
/* JOURNEY LADDER */
.lrow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--stat-border)}
.lrow:last-child{border-bottom:none}
.lcirc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'Cinzel',serif}
.la{background:var(--acc18);border:1.5px solid var(--accent);color:var(--accent)}
.ld{background:var(--acc6);border:1px solid var(--acc30);color:var(--text3)}
.lf{background:var(--bg-stat);border:1px solid var(--stat-border);color:var(--text5)}
/* CI SELECTOR */
.ci-select-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.ci-sel-btn{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--text3);transition:all .15s}
.ci-sel-btn.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent)}
/* METHOD SELECTOR */
.mcat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.mcat-pill{flex-shrink:0;background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--text4);cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'DM Sans',sans-serif}
.mcat-pill:hover{background:var(--acc6);color:var(--text2)}
.mcat-pill.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent)}
.meth-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:175px;overflow-y:auto;padding:2px;scrollbar-width:thin}
.meth-pill{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
.meth-pill:hover{background:var(--acc6);color:var(--text2)}
.meth-pill.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent);font-weight:600}
/* BUTTONS */
.big-timer{font-size:50px;font-weight:900;font-family:'Cinzel',serif;color:var(--accent);letter-spacing:3px;text-align:center;line-height:1;margin:8px 0}
.big-timer.running{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.btn-green{background:linear-gradient(135deg,#0f5c2e,#22a85a);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-red{background:linear-gradient(135deg,#5c0f0f,#c0392b);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;margin-bottom:8px;letter-spacing:.3px}
.btn-gold{background:linear-gradient(135deg,var(--acc18),var(--accent));border:none;border-radius:10px;padding:13px;color:var(--bg);font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:opacity .2s}
.btn-gold:hover{opacity:.9}
.btn-gold:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:10px;padding:11px;color:var(--text3);font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-ghost:hover{background:var(--acc6);color:var(--text2)}
.btn-outline{background:none;border:1px solid var(--acc30);border-radius:8px;padding:8px 14px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{background:var(--acc6)}
textarea{background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:9px 11px;color:var(--text1);font-size:12px;width:100%;outline:none;resize:vertical;min-height:55px;font-family:'DM Sans',sans-serif}
textarea::placeholder{color:var(--text5)}
textarea:focus{border-color:var(--acc30)}
/* CHARTS */
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:100px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{border-radius:3px 3px 0 0;width:100%;background:var(--acc18);min-height:2px;transition:height .5s ease}
.bar.today{background:linear-gradient(180deg,var(--accent),var(--acc45))}
.bar-lbl{font-size:9px;color:var(--text4);text-align:center}
.bar-val{font-size:8px;color:var(--text5);text-align:center;min-height:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:4px 0}
.cal-dot{aspect-ratio:1;border-radius:3px;background:var(--bg-stat)}
.cal-dot.on{background:var(--acc45)}
.cal-dot.goal{background:rgba(34,168,90,.55)}
.cal-dot.now{border:1.5px solid var(--accent)}
/* CI REFERENCE */
.ci-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--stat-border);align-items:flex-start}
.ci-row:last-child{border-bottom:none}
.ci-badge{background:var(--acc12);border:1px solid var(--acc30);border-radius:5px;padding:2px 6px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--accent);width:44px;text-align:center;flex-shrink:0}
/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ach-card{border-radius:10px;padding:12px 9px;text-align:center}
.ach-card.unlocked{background:var(--acc6);border:1px solid var(--acc30)}
.ach-card.locked{background:var(--bg-stat);border:1px solid var(--stat-border);opacity:.4}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-nav);border-top:1px solid var(--nav-border);display:flex;max-width:480px;margin:0 auto;z-index:20}
.nav-btn{flex:1;padding:8px 0 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text5);transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:18px;line-height:1.2}
/* TOASTS & OVERLAYS */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--acc45);border-radius:12px;padding:11px 20px;color:var(--accent);font-weight:600;font-size:13px;z-index:300;white-space:pre-line;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:sd .3s ease}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.sess-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;color:var(--accent);z-index:400;pointer-events:none;animation:xpf .9s ease forwards;text-align:center}
@keyframes xpf{0%{opacity:0;transform:translate(-50%,-65%)}30%{opacity:1;transform:translate(-50%,-50%)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-38%)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:50;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.sheet{background:var(--bg-sheet);border:1px solid var(--card-border);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--stat-border);border-radius:2px;margin:0 auto 16px}
.pscreen{position:fixed;inset:0;background:var(--bg-ps);z-index:100;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;max-width:480px;margin:0 auto}
.pcard{background:var(--bg-card);border:1px solid var(--card-border);border-radius:14px;padding:16px;width:100%;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:border-color .2s}
.pcard:hover{border-color:var(--acc45)}
.pcard.active-p{border-color:var(--accent);background:var(--acc6)}
.pavatar{width:40px;height:40px;border-radius:50%;background:var(--acc12);border:1px solid var(--acc30);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0}
.gold-inp{background:var(--bg-stat);border:1px solid var(--acc30);border-radius:8px;padding:10px 14px;color:var(--text1);font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.gold-inp:focus{border-color:var(--accent)}
.gold-inp::placeholder{color:var(--text4)}
.theme-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.theme-chip{border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .25s;flex:1;max-width:78px}
.theme-chip.sel{border-color:var(--accent)}
.theme-swatch{width:100%;padding:10px 6px 7px;display:flex;flex-direction:column;align-items:center;gap:4px}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-lbl{font-size:8px;font-weight:700;text-align:center}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22a85a;animation:blink 1.2s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.del-btn{background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.2);border-radius:6px;padding:3px 8px;color:#a03232;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn:hover{background:rgba(200,50,50,.15)}
.goal-inp{background:var(--bg-stat);border:1px solid var(--acc30);border-radius:7px;padding:5px 8px;color:var(--accent);font-size:15px;font-weight:700;width:76px;outline:none;text-align:center;font-family:'Cinzel',serif}
.xp-tag{background:var(--acc6);border:1px solid var(--acc30);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent);font-weight:600;display:inline-block;margin-top:6px}
.mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-pill{flex:1;padding:8px;border-radius:8px;background:var(--bg-stat);border:1px solid var(--surf-border);cursor:pointer;font-size:12px;font-weight:500;color:var(--text4);font-family:'DM Sans',sans-serif;text-align:center;transition:all .2s}
.mode-pill.active{background:var(--acc12);border-color:var(--acc30);color:var(--accent)}
.page-title{font-family:'Cinzel',serif;font-size:14px;color:var(--accent);margin-bottom:2px}
.page-sub{font-size:11px;color:var(--text4);margin-bottom:12px}
.empty{text-align:center;padding:36px 16px;color:var(--text5);font-size:12px;line-height:2}
.ci-big{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--accent);line-height:1}
.divider{width:100%;text-align:center;font-size:10px;color:var(--text5);text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px}
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;border:1px solid var(--stat-border);background:var(--bg-stat);display:flex;align-items:center;justify-content:center;color:var(--text5);font-size:11px;text-align:center;transition:border-color .2s;overflow:hidden}
.photo-thumb:hover{border-color:var(--acc30)}

  {id:'str7',icon:'⚡',title:'Week Warrior',desc:'7-day streak',check:c=>c.streak>=7},

  {id:'ci3',icon:'🌿',title:'Advancing',desc:'Reach CI-3',check:c=>(c.ciLevel||0)>=3},
  {id:'ci5',icon:'⭐',title:'Halfway',desc:'Reach CI-5',check:c=>(c.ciLevel||0)>=5},

];
const THEMES=[
  {id:'shadow',name:'Shadow',bg:'#0D0B14',accent:'#C9A84C',text:'#E2DDD0',mid:'#3d2a00'},
  {id:'ivory',name:'Ivory',bg:'#F0EDE6',accent:'#7A5C10',text:'#1a1710',mid:'#C8A848'},
  {id:'forest',name:'Forest',bg:'#0A1409',accent:'#4CAF50',text:'#D0EDD0',mid:'#2d5c10'},
  {id:'ocean',name:'Ocean',bg:'#050D18',accent:'#38B4D4',text:'#C8E8F5',mid:'#0a4070'},
  {id:'neon',name:'Neon',bg:'#07060E',accent:'#DC00FF',text:'#F0E5FF',mid:'#6600AA'}
];
const QUOTES=[
  "Every session is a message to your body: grow.","Progress is measured in months, not days.",
  "You are restoring what was taken. That is strength.","Consistency beats intensity every time.",
  "The body remembers how to grow.","Thousands are walking this path with you.",
  "Slow and steady wins the long game.","Your patience today is your progress tomorrow.",
  "Tension plus time equals growth.","Every session counts, even the short ones.",
  "You started. That alone puts you ahead.","Rest is part of the process too.",
  "Trust the process. The results follow.","Small efforts, compounded daily, become transformation.",
  "What you restore, no one can take again.","Dedication is showing up even on the hard days.",
  "Your body is on your side.","Months from now you'll be glad you started today.",
  "Every restorer started at CI-0. Every one.","The marathon runner doesn't sprint every mile."
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let profiles=[],currentPid=null,currentTheme='shadow';
let char={sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',
  dailyGoalMin:120,goalDays:0,theme:'shadow',customMethods:[],ciLevel:0,ciHistory:[]};
let logs=[],photos=[];
let tab='today';
let activeTimer=null,timerInterval=null,timerSecs=0;
let showProfileScreen=false,showSessionSheet=false,showStopSheet=false,showCISheet=false;
let logMode='timer',manualStart='',manualEnd='',manualStillActive=false;
let sheetCat=null,sheetMethod='',sheetNotes='';
let currentCoachCTA=null;

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmtHMS=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`};
const fmtMin=m=>{if(m<=0)return'0m';if(m<60)return m+'m';const h=Math.floor(m/60),r=m%60;return r?`${h}h ${r}m`:`${h}h`};
const today=()=>new Date().toISOString().split('T')[0];
const todayLogs=()=>logs.filter(l=>l.date===today());

// How many minutes of the currently running session fall within today only
// Handles sessions that started yesterday or days ago (T-tape / long sessions)
function liveTimerTodayMins(){
  if(!activeTimer||!activeTimer.startedAt)return 0;
  const midnight=new Date();midnight.setHours(0,0,0,0);
  // Approximate original session start = now minus total elapsed seconds
  const totalElapsedMs=timerSecs*1000;
  const sessionStartMs=Date.now()-totalElapsedMs;
  // Only count time from midnight (or session start if it started today)
  const countFromMs=Math.max(sessionStartMs,midnight.getTime());
  const msSinceCount=Date.now()-countFromMs;
  return Math.floor(msSinceCount/60000);
}

const todayMin=()=>todayLogs().reduce((a,l)=>a+l.dur,0)+liveTimerTodayMins();
const thisWeekDays=()=>{const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;};
const dayLbl=d=>['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(d+'T12:00:00').getDay()];
const catFor=id=>CATS.find(c=>c.id===id)||{icon:'?',color:'#888',mult:1,label:'',methods:[]};
const dailyQuote=()=>QUOTES[Math.floor((new Date().getDate()*13+new Date().getMonth()*7)%QUOTES.length)];

// ── STORAGE ────────────────────────────────────────────────────────────────────
const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del(k){try{localStorage.removeItem(k);}catch{}}
};
function loadAll(){
  profiles=S.get('rst-profiles')||[];currentPid=S.get('rst-active-pid');
  if(currentPid&&profiles.find(p=>p.id===currentPid))loadProfile(currentPid);
  else if(profiles.length>0){currentPid=profiles[0].id;S.set('rst-active-pid',currentPid);loadProfile(currentPid);}
  else showProfileScreen=true;
}
function loadProfile(pid){
  const defaults={sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0,theme:'shadow',customMethods:[],ciLevel:0,ciHistory:[]};
  char={...defaults};logs=[];photos=[];
  const c=S.get(`rst-${pid}-char`);if(c)char={...char,...c};
  if(!char.customMethods)char.customMethods=[];
  if(char.ciLevel===undefined)char.ciLevel=0;
  if(!char.ciHistory)char.ciHistory=[];
  const l=S.get(`rst-${pid}-logs`);if(l)logs=l;
  const p=S.get(`rst-${pid}-photos`);if(p)photos=p;
  currentTheme=char.theme||'shadow';applyTheme(currentTheme);
  const t=S.get(`rst-${pid}-timer`);
  if(t&&t.startedAt){activeTimer=t;timerSecs=Math.floor((Date.now()-t.startedAt)/1000)+(t.elapsedOnPause||0);sheetMethod=t.method||'';sheetCat=t.cat||null;sheetNotes=t.notes||'';startInterval();}
}
function saveChar(){if(!currentPid)return;S.set(`rst-${currentPid}-char`,char);}
function saveLogs(){if(!currentPid)return;S.set(`rst-${currentPid}-logs`,logs);}
function savePhotos(){if(!currentPid)return;S.set(`rst-${currentPid}-photos`,photos);}
function saveTimer(t){if(!currentPid)return;t?S.set(`rst-${currentPid}-timer`,t):S.del(`rst-${currentPid}-timer`);}
function saveProfiles(){S.set('rst-profiles',profiles);}

// ── THEME ──────────────────────────────────────────────────────────────────────
function applyTheme(id){document.documentElement.setAttribute('data-theme',id||'shadow');}
function selectTheme(id){currentTheme=id;applyTheme(id);char.theme=id;if(currentPid)saveChar();document.querySelectorAll('.theme-chip').forEach(el=>el.classList.toggle('sel',el.dataset.tid===id));}

// ── PROFILE OPS ────────────────────────────────────────────────────────────────
function createProfile(name){
  const id='p'+Date.now();profiles.push({id,name,createdAt:today()});saveProfiles();currentPid=id;
  char={sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name,dailyGoalMin:120,goalDays:0,theme:currentTheme,customMethods:[],ciLevel:0,ciHistory:[]};
  logs=[];photos=[];S.set('rst-active-pid',id);saveChar();showProfileScreen=false;tab='today';render();
}
function switchProfile(pid){
  currentPid=pid;stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;
  char={sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0,theme:'shadow',customMethods:[],ciLevel:0,ciHistory:[]};
  logs=[];photos=[];loadProfile(pid);S.set('rst-active-pid',pid);showProfileScreen=false;tab='today';render();
}

function showRenameInline(pid){
  const el=document.getElementById(`rename-inline-${pid}`);
  if(!el)return;
  el.style.display='block';
  const inp=document.getElementById(`rename-val-${pid}`);
  if(inp){inp.focus();inp.select();}
  inp.onkeydown=e=>{if(e.key==='Enter')saveRenameInline(pid);};
}
function saveRenameInline(pid){
  const inp=document.getElementById(`rename-val-${pid}`);
  const n=inp?.value.trim();if(!n)return;
  profiles=profiles.map(p=>p.id===pid?{...p,name:n}:p);
  saveProfiles();
  if(pid===currentPid){char.name=n;saveChar();}
  renderProfileScreen();
}
function confirmDeleteProfile(pid,name){
  confirmDialog(
    `Delete "${name}"?`,
    'All sessions, photos, and progress data for this profile will be permanently deleted. This cannot be undone.',
    'Delete Profile',
    ()=>deleteProfile(pid)
  );
}
function deleteProfile(pid){
  // Clear all stored data for this profile
  S.del(`rst-${pid}-char`);
  S.del(`rst-${pid}-logs`);
  S.del(`rst-${pid}-photos`);
  S.del(`rst-${pid}-timer`);
  profiles=profiles.filter(p=>p.id!==pid);
  saveProfiles();
  // Switch to another profile or show create screen
  if(profiles.length>0){
    currentPid=profiles[0].id;
    S.set('rst-active-pid',currentPid);
    loadProfile(currentPid);
    showProfileScreen=true;
    renderProfileScreen();
  } else {
    currentPid=null;
    S.del('rst-active-pid');
    showProfileScreen=true;
    render();
  }
}
let liveTickCount=0;
function startInterval(){
  stopInterval();liveTickCount=0;
  timerInterval=setInterval(()=>{
    if(!activeTimer)return;
    timerSecs=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
    const el=document.getElementById('mc-run-time');if(el)el.textContent=fmtHMS(timerSecs);
    const el2=document.getElementById('mc-run-time-2');if(el2)el2.textContent=fmtHMS(timerSecs);
    const si=document.getElementById('sheet-timer');if(si)si.textContent=fmtHMS(timerSecs);
    // Every 60 seconds — refresh live stats elements without full re-render
    liveTickCount++;
    if(liveTickCount%60===0){
      refreshLiveStats();
    }
  },1000);
}
function refreshLiveStats(){
  // Update goal bar and today stats inline if on Today tab
  const tMin=todayMin();
  const goal=char.dailyGoalMin||120;
  const goalPct=Math.min(100,Math.round((tMin/goal)*100));
  // Goal bar fill
  const fill=document.querySelector('.goal-fill');
  if(fill){
    fill.style.width=goalPct+'%';
    fill.className='goal-fill '+(goalPct>=100?'goal-fill-ok':'goal-fill-warn');
  }
  // Goal text
  const goalTexts=document.querySelectorAll('[data-live="goal-text"]');
  goalTexts.forEach(el=>{el.textContent=goalPct>=100?'🎯 Goal reached!':fmtMin(Math.max(0,goal-tMin))+' to go';});
  const goalDone=document.querySelector('[data-live="goal-done"]');
  if(goalDone)goalDone.textContent=fmtMin(tMin)+' done';
  // Today stat tile
  const todayStat=document.querySelector('[data-live="today-min"]');
  if(todayStat)todayStat.textContent=fmtMin(tMin);
}
function stopInterval(){clearInterval(timerInterval);timerInterval=null;}
function beginSession(){
  if(!sheetMethod||!sheetCat)return;
  activeTimer={startedAt:Date.now(),method:sheetMethod,cat:sheetCat,notes:sheetNotes,elapsedOnPause:0};
  timerSecs=0;saveTimer(activeTimer);startInterval();showSessionSheet=false;
  if(navigator.vibrate)navigator.vibrate(60);
  render();
}
function stopSession(){
  if(!activeTimer)return;stopInterval();
  const elapsed=Math.floor((Date.now()-activeTimer.startedAt)/1000)+(activeTimer.elapsedOnPause||0);
  timerSecs=elapsed;activeTimer={...activeTimer,startedAt:null,elapsedOnPause:elapsed};
  saveTimer(activeTimer);
  if(navigator.vibrate)navigator.vibrate([40,30,40]);
  showStopSheet=true;render();
}
function resumeSession(){
  if(!activeTimer)return;
  activeTimer={...activeTimer,startedAt:Date.now(),elapsedOnPause:timerSecs};
  saveTimer(activeTimer);startInterval();showStopSheet=false;render();
}
function commitSession(notes){
  const finalMins=Math.max(1,Math.round(timerSecs/60));
  const method=activeTimer?activeTimer.method:sheetMethod;
  const catId=activeTimer?activeTimer.cat:sheetCat;
  awardSession(method,catId,finalMins,notes||sheetNotes||'');
  stopInterval();activeTimer=null;timerSecs=0;sheetMethod='';sheetCat=null;sheetNotes='';
  saveTimer(null);showStopSheet=false;render();
}
function logManual(method,catId,totalMins,notes){
  if(totalMins<=0)return;
  awardSession(method,catId,totalMins,notes||'');
  showSessionSheet=false;render();
}
function awardSession(method,catId,totalMins,notes){
  const td=today();
  let ns=char.streak;
  if(char.lastDate){const diff=Math.round((new Date(td)-new Date(char.lastDate))/86400000);if(diff===1)ns++;else if(diff>1)ns=1;}else ns=1;
  const prevTodayMin=todayMin();
  const nm=char.methods.includes(method)?char.methods:[...char.methods,method];
  let ngd=char.goalDays;
  if(prevTodayMin<char.dailyGoalMin&&(prevTodayMin+totalMins)>=char.dailyGoalMin)ngd++;
  char={...char,sessions:char.sessions+1,minutes:char.minutes+totalMins,streak:ns,lastDate:td,methods:nm,goalDays:ngd};
  const newly=[];
  for(const a of ACHS)if(!char.achievements.includes(a.id)&&a.check(char)){char.achievements=[...char.achievements,a.id];newly.push(a.title);}
  logs=[{id:Date.now(),date:td,method,cat:catId,dur:totalMins,notes,xp:0},...logs];
  saveChar();saveLogs();
  showSessFlash(`✓ ${fmtMin(totalMins)}`);
  if(newly.length)showToast(`🏅 ${newly[0]} — milestone reached!`);
  else if(ns>1)showToast(`${fmtMin(totalMins)} logged · ${ns}-day streak 🔥`);
  else showToast(`${fmtMin(totalMins)} logged · Session #${char.sessions}`);
}

// ── CI LEVEL ───────────────────────────────────────────────────────────────────
function setCILevel(n){
  const prev=char.ciLevel||0;if(n===prev)return;
  char.ciLevel=n;
  char.ciHistory=[...(char.ciHistory||[]),{ci:n,date:today()}];
  const newly=[];
  for(const a of ACHS)if(!char.achievements.includes(a.id)&&a.check(char)){char.achievements=[...char.achievements,a.id];newly.push(a.title);}
  saveChar();
  if(n>prev)showToast(`🎉 ${LEVELS[n].ci} reached!`);
  if(newly.length)setTimeout(()=>showToast(`🏅 ${newly[0]} unlocked!`),1800);
  showCISheet=false;render();
}

// ── PHOTOS ─────────────────────────────────────────────────────────────────────
function addPhoto(ciLevel,dataUrl,note,dateStr){
  const photoDate=dateStr||today();
  photos=[{id:Date.now(),ci:ciLevel,date:photoDate,url:dataUrl,note:note||'',analysis:null},...photos];
  savePhotos();showToast('📸 Progress photo saved!');tab='photos';render();
}
function deletePhoto(id){
  confirmDialog(
    'Delete this photo?',
    'This photo will be permanently removed from your timeline. This cannot be undone.',
    'Delete',
    ()=>{photos=photos.filter(p=>p.id!==id);savePhotos();render();}
  );
}

// ── CONFIRM DIALOG ─────────────────────────────────────────────────────────────
function confirmDialog(title,msg,confirmLabel,onConfirm){
  const ex=document.getElementById('confirm-ov');if(ex)ex.remove();
  const el=document.createElement('div');el.className='overlay';el.id='confirm-ov';
  el.innerHTML=`<div class="sheet" style="padding-bottom:28px">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;text-align:center;margin-bottom:10px">⚠️</div>
    <div style="font-family:Cinzel,serif;font-size:14px;color:var(--text1);text-align:center;margin-bottom:8px">${title}</div>
    <div style="font-size:12px;color:var(--text3);text-align:center;line-height:1.6;margin-bottom:20px">${msg}</div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" id="confirm-cancel" style="flex:1">Cancel</button>
      <button id="confirm-ok" style="flex:1;background:linear-gradient(135deg,#5c0f0f,#c0392b);border:none;border-radius:10px;padding:13px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif">${confirmLabel}</button>
    </div>
  </div>`;
  document.getElementById('root').appendChild(el);
  document.getElementById('confirm-cancel').onclick=()=>el.remove();
  document.getElementById('confirm-ok').onclick=()=>{el.remove();onConfirm();};
  // Also close on backdrop tap
  el.addEventListener('click',e=>{if(e.target===el)el.remove();});
}
function openPhotoViewer(photo,eraPhotos){
  // eraPhotos = array of photos in this era for swipe navigation
  // if not provided, just show the single photo
  const era=eraPhotos||[photo];
  let idx=era.findIndex(p=>p.id===photo.id);
  if(idx===-1)idx=0;

  function buildContent(p,i){
    const hasPrev=i<era.length-1;
    const hasNext=i>0;
    const isEditing=false;
    return`
      <div style="position:relative;width:100%">
        <img src="${p.url}" alt="Progress photo" style="max-width:100%;max-height:50vh;border-radius:10px;object-fit:contain;display:block;margin:0 auto">
        ${era.length>1?`
          <div style="position:absolute;top:50%;left:-8px;transform:translateY(-50%)">
            <button onclick="viewerNav(-1)" style="background:rgba(0,0,0,.5);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;${!hasPrev?'opacity:.2;pointer-events:none':''}">‹</button>
          </div>
          <div style="position:absolute;top:50%;right:-8px;transform:translateY(-50%)">
            <button onclick="viewerNav(1)" style="background:rgba(0,0,0,.5);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;${!hasNext?'opacity:.2;pointer-events:none':''}">›</button>
          </div>`:''}
      </div>

      <div id="viewer-meta" style="margin-top:10px;text-align:center;width:100%">
        <div style="font-family:Cinzel,serif;font-size:14px;color:var(--accent)">${p.ci}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${p.date}</div>
        ${p.note?`<div style="font-size:12px;color:var(--text2);margin-top:6px;font-style:italic">${p.note}</div>`:'<div style="font-size:11px;color:var(--text5);margin-top:6px">No caption</div>'}
      </div>
      <div id="viewer-edit-area"></div>
      <div style="display:flex;gap:8px;margin-top:14px;width:100%">
        <button class="btn-ghost" onclick="document.getElementById('photo-view').remove()" style="flex:1">Close</button>
        <button class="btn-outline" onclick="openViewerEdit(${p.id})" style="flex:0 0 60px;font-size:12px">✏ Edit</button>
        <button class="del-btn" onclick="confirmDialog('Delete this photo?','This will permanently remove it from your timeline.','Delete',()=>{deletePhoto(${p.id});document.getElementById('photo-view').remove();})" style="padding:10px 14px;font-size:12px">Delete</button>
      </div>`;
  }

  const el=document.createElement('div');el.className='photo-viewer';el.id='photo-view';
  el.innerHTML=buildContent(era[idx],idx);
  document.getElementById('root').appendChild(el);

  // Swipe touch handling
  let touchStartX=0;
  el.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>50){dx<0?viewerNav(1):viewerNav(-1);}
  },{passive:true});

  // Nav function scoped to this viewer instance
  window.viewerNav=(dir)=>{
    const newIdx=idx-dir; // dir=1 means right/newer, dir=-1 means left/older
    if(newIdx<0||newIdx>=era.length)return;
    idx=newIdx;
    el.innerHTML=buildContent(era[idx],idx);
    // Re-attach touch
    el.removeEventListener('touchstart',()=>{});
    el.removeEventListener('touchend',()=>{});
    el.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
    el.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-touchStartX;
      if(Math.abs(dx)>50){dx<0?viewerNav(1):viewerNav(-1);}
    },{passive:true});
  };

  // Edit function
  window.openViewerEdit=(photoId)=>{
    const p=photos.find(x=>x.id===photoId);if(!p)return;
    const editArea=document.getElementById('viewer-edit-area');
    if(!editArea)return;
    editArea.innerHTML=`
      <div style="margin-top:12px;background:var(--bg-stat);border:1px solid var(--acc30);border-radius:10px;padding:12px;width:100%">
        <div style="font-size:10px;color:var(--text4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px">Date</div>
        <input type="date" id="edit-photo-date" value="${p.date}" max="${today()}"
          style="background:var(--bg-card);border:1px solid var(--acc30);border-radius:7px;padding:7px 10px;color:var(--accent);font-size:14px;font-weight:600;width:100%;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px">
        <div style="font-size:10px;color:var(--text4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px">Caption</div>
        <input type="text" id="edit-photo-note" value="${p.note||''}" placeholder="Add a caption..."
          style="background:var(--bg-card);border:1px solid var(--stat-border);border-radius:7px;padding:7px 10px;color:var(--text1);font-size:12px;width:100%;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px">
        <div style="display:flex;gap:7px">
          <button class="btn-ghost" onclick="document.getElementById('viewer-edit-area').innerHTML=''" style="flex:0 0 70px;padding:8px">Cancel</button>
          <button class="btn-gold" onclick="saveViewerEdit(${photoId})" style="flex:1;padding:8px">Save</button>
        </div>
      </div>`;
    document.getElementById('edit-photo-note').focus();
  };

  window.saveViewerEdit=(photoId)=>{
    const dateVal=document.getElementById('edit-photo-date')?.value||'';
    const noteVal=document.getElementById('edit-photo-note')?.value||'';
    photos=photos.map(p=>p.id===photoId?{...p,date:dateVal||p.date,note:noteVal}:p);
    savePhotos();
    // Refresh the viewer content to show updated values
    el.innerHTML=buildContent(era[idx],idx);
    showToast('✓ Photo updated');
    // Re-attach touch
    el.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
    el.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-touchStartX;
      if(Math.abs(dx)>50){dx<0?viewerNav(1):viewerNav(-1);}
    },{passive:true});
  };
}

// ── EXPORT ─────────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Date','Method','Category','Duration (min)','Notes']];
  logs.forEach(l=>{const cat=catFor(l.cat);rows.push([l.date,l.method,cat.label,l.dur,(l.notes||'').replace(/,/g,' ')]);});
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`restoration-log-${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('📊 CSV exported!');
}

// ── CI RING SVG ────────────────────────────────────────────────────────────────
function arcD(cx,cy,r,startDeg,endDeg){
  const toR=d=>d*Math.PI/180;
  const sx=cx+r*Math.cos(toR(startDeg)),sy=cy+r*Math.sin(toR(startDeg));
  const ex=cx+r*Math.cos(toR(endDeg)),ey=cy+r*Math.sin(toR(endDeg));
  const sweep=((endDeg-startDeg)%360+360)%360;
  const large=sweep>180?1:0;
  return`M${sx.toFixed(2)},${sy.toFixed(2)} A${r},${r} 0 ${large},1 ${ex.toFixed(2)},${ey.toFixed(2)}`;
}
function ciRingSVG(){
  const ci=char.ciLevel||0;
  const cx=110,cy=105,r=80,sw=14;
  const startDeg=148,totalDeg=244,segCount=10,gap=1.5;
  const segDeg=totalDeg/segCount;
  let paths='';
  for(let i=0;i<segCount;i++){
    const s=startDeg+i*segDeg+gap,e=startDeg+(i+1)*segDeg-gap;
    const filled=i<ci;
    const isLast=i===ci-1;
    const op=filled?(isLast?'1':'0.8'):'0.2';
    const color=filled?'var(--accent)':'var(--stat-border,#444)';
    paths+=`<path d="${arcD(cx,cy,r,s,e)}" stroke="${color}" stroke-width="${sw}" fill="none" stroke-linecap="round" opacity="${op}"/>`;
  }
  // Active dot at current position
  const dotDeg=ci>0?startDeg+ci*segDeg:startDeg;
  const toR=d=>d*Math.PI/180;
  const dotX=cx+r*Math.cos(toR(dotDeg)),dotY=cy+r*Math.sin(toR(dotDeg));
  const dotEl=ci>0?`<circle cx="${dotX.toFixed(1)}" cy="${dotY.toFixed(1)}" r="6" fill="var(--accent)"/>
    <circle cx="${dotX.toFixed(1)}" cy="${dotY.toFixed(1)}" r="3" fill="var(--bg)"/>`:
    `<circle cx="${(cx+r*Math.cos(toR(startDeg))).toFixed(1)}" cy="${(cy+r*Math.sin(toR(startDeg))).toFixed(1)}" r="5" fill="var(--stat-border,#444)" opacity="0.5"/>`;
  // Bottom labels
  const lx=cx+r*Math.cos(toR(startDeg));
  const ly=cy+r*Math.sin(toR(startDeg));
  const rx=cx+r*Math.cos(toR(startDeg+totalDeg));
  const ry=cy+r*Math.sin(toR(startDeg+totalDeg));
  return`<svg viewBox="0 0 220 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:220px;display:block;margin:0 auto">
    ${paths}${dotEl}
    <text x="${cx}" y="${cy-10}" text-anchor="middle" font-family="Cinzel,serif" font-size="34" font-weight="900" fill="var(--accent)">${LEVELS[ci].ci}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="500" fill="var(--text3)">${ci===0?'Starting point':ci===10?'Fully restored':'In progress'}</text>
    <text x="${cx}" y="${cy+30}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="var(--text4)">${ci<10?`Next: CI-${ci+1}`:'🏆 Journey Complete'}</text>
    <text x="${(lx-5).toFixed(0)}" y="${(ly+16).toFixed(0)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="var(--text5)">CI-0</text>
    <text x="${(rx+5).toFixed(0)}" y="${(ry+16).toFixed(0)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="var(--text5)">CI-10</text>
  </svg>`;
}

// ── COACH MESSAGE ──────────────────────────────────────────────────────────────
function coachMessage(){
  const td=today();
  const ci=char.ciLevel||0;
  const daysSinceLast=char.lastDate?Math.round((new Date(td)-new Date(char.lastDate))/86400000):-1;
  const sessThisWeek=logs.filter(l=>(new Date()-new Date(l.date+'T12:00:00'))/86400000<=7).length;
  const tMin=todayMin();
  const goal=char.dailyGoalMin||120;
  const hoursTotal=char.minutes/60;
  const isRunning=!!activeTimer&&!!activeTimer.startedAt;

  if(char.sessions===0)
    return{icon:'👋',msg:`Welcome, ${char.name}! Start your first session to begin tracking your restoration journey. Even 15 minutes is a great first step.`,cta:'log'};
  if(isRunning)
    return{icon:'⏱',msg:`Session in progress — ${fmtHMS(timerSecs)}. Stay relaxed; consistent, comfortable tension is more effective than pushing harder.`,cta:null};
  if(daysSinceLast>=5)
    return{icon:'📅',msg:`It's been ${daysSinceLast} days since your last session. Restoration responds to regular, consistent tension — getting back on track today matters.`,cta:'log'};
  if(daysSinceLast>=3)
    return{icon:'⏰',msg:`${daysSinceLast} days since your last session. Even 15–20 minutes today keeps the momentum going.`,cta:'log'};
  if(tMin>=goal){
    const s=char.streak;
    return{icon:'🎯',msg:`Daily goal hit — ${fmtMin(tMin)} logged today.${s>=3?` ${s}-day streak 🔥`:''} Your body is receiving the consistent tension signal it needs.`,cta:null};
  }
  if(photos.length===0&&char.sessions>=3)
    return{icon:'📸',msg:`You've logged ${char.sessions} sessions — add a baseline photo now. Progress can be hard to notice day-to-day, but photos months apart tell the real story.`,cta:'photos'};
  if(ci===0&&hoursTotal>=8)
    return{icon:'📊',msg:`You've logged over ${Math.round(hoursTotal)} hours. Head to the Journey tab to set your current CI level — tracking where you are is key to seeing where you're going.`,cta:'journey'};
  if(sessThisWeek<=1&&daysSinceLast>=0)
    return{icon:'💡',msg:`Aim for at least 20–30 minutes daily if possible — shorter daily sessions generally outperform occasional long ones for tissue response.`,cta:'log'};
  // Default rotating messages (honest, no fake timelines)
  const day=new Date().getDate();
  const msgs=[
    {icon:'📈',msg:`${Math.round(hoursTotal)} hours of restoration time logged. Every hour is consistent tension applied — that's the only driver of growth.`},
    {icon:'🔬',msg:`You've tried ${char.methods.length} method${char.methods.length===1?'':'s'}. Mixing manual and device methods can help apply tension across different areas of the prepuce over time.`},
    {icon:'🌱',msg:`Currently at ${LEVELS[ci].ci}. ${ci<10?`Advancement between CI levels typically takes months of consistent effort.`:`You've completed the full restoration journey.`}`},
    {icon:'💡',msg:`If your skin ever feels sore or fatigued, a rest day is always the right call. Recovery is part of the process.`},
    {icon:'⏳',msg:`${char.streak>0?`${char.streak}-day streak.`:'Keep building your streak.'} Restoration is one of the slowest tissue changes the body makes — patience and consistency are your only tools.`},
  ];
  return msgs[day%msgs.length];
}

// ── WEEKLY SUMMARY ─────────────────────────────────────────────────────────────
function getMondayOf(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const day=d.getDay(); // 0=Sun
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}
function getWeekDates(mondayStr){
  const dates=[];
  for(let i=0;i<7;i++){
    const d=new Date(mondayStr+'T12:00:00');
    d.setDate(d.getDate()+i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}
function buildWeeklySummary(){
  const td=today();
  const thisMonday=getMondayOf(td);

  // Only show from Monday onwards — if today IS the start of week
  // Also show on subsequent days until dismissed
  const dismissed=char.weeklySummaryDismissed||'';
  if(dismissed===thisMonday)return''; // dismissed this week

  // Previous week = Monday before thisMonday
  const prevMonday=new Date(thisMonday+'T12:00:00');
  prevMonday.setDate(prevMonday.getDate()-7);
  const prevMondayStr=prevMonday.toISOString().split('T')[0];
  const prevWeekDates=getWeekDates(prevMondayStr);

  // Only show if prev week has any data at all, or if it's been at least a week since first log
  const prevWeekLogs=logs.filter(l=>prevWeekDates.includes(l.date));
  if(prevWeekLogs.length===0)return'';

  // Week before that for comparison
  const prevPrevMonday=new Date(prevMondayStr+'T12:00:00');
  prevPrevMonday.setDate(prevPrevMonday.getDate()-7);
  const prevPrevDates=getWeekDates(prevPrevMonday.toISOString().split('T')[0]);
  const prevPrevLogs=logs.filter(l=>prevPrevDates.includes(l.date));

  // Calc prev week stats
  const sessions=prevWeekLogs.length;
  const totalMins=prevWeekLogs.reduce((a,l)=>a+l.dur,0);
  const activeDays=new Set(prevWeekLogs.map(l=>l.date)).size;
  const goalDays=prevWeekDates.filter(d=>
    logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0)>=(char.dailyGoalMin||120)
  ).length;

  // Best day
  const dayTotals=prevWeekDates.map(d=>({date:d,mins:logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0)}));
  const bestDay=dayTotals.reduce((a,b)=>b.mins>a.mins?b:a,{date:'',mins:0});
  const bestDayName=bestDay.mins>0?new Date(bestDay.date+'T12:00:00').toLocaleDateString('en',{weekday:'long'}):'';

  // Comparison to week before
  const prevSessions=prevPrevLogs.length;
  const prevTotalMins=prevPrevLogs.reduce((a,l)=>a+l.dur,0);
  let compLine='';
  if(prevPrevLogs.length===0){
    compLine='First full week tracked — great start.';
  } else if(sessions>prevSessions){
    compLine=`Up from ${prevSessions} session${prevSessions!==1?'s':''} the week before. Keep building.`;
  } else if(sessions===prevSessions){
    const timeDiff=totalMins-prevTotalMins;
    compLine=timeDiff>5?`Same sessions as the previous week but ${fmtMin(timeDiff)} more time.`:
              timeDiff<-5?`Same sessions as the previous week but ${fmtMin(Math.abs(timeDiff))} less time.`:
              'Consistent with the previous week.';
  } else {
    compLine=`Down from ${prevSessions} session${prevSessions!==1?'s':''} the week before. This week is a new start.`;
  }

  // Headline — honest, based on actual data
  let headline='',headlineColor='var(--text1)';
  if(sessions===0){return'';}
  else if(sessions>=6){headline='Strong week.';headlineColor='var(--green)';}
  else if(sessions>=4){headline='Solid week.';headlineColor='var(--accent)';}
  else if(sessions>=2){headline='Getting there.';headlineColor='var(--accent)';}
  else{headline='A start is a start.';headlineColor='var(--text2)';}

  // Format the week range label
  const weekEnd=prevWeekDates[6];
  const fmtShort=d=>new Date(d+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});
  const weekLabel=`${fmtShort(prevMondayStr)} – ${fmtShort(weekEnd)}`;

  return`<div style="background:var(--bg-card);border:1px solid var(--card-border-gold);border-radius:12px;padding:14px;margin-bottom:9px;position:relative">
    <button onclick="dismissWeeklySummary()" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:14px;color:var(--text5);cursor:pointer;padding:2px 6px;line-height:1" title="Dismiss">✕</button>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px">Weekly Recap</div>
    <div style="font-size:9px;color:var(--text5);margin-bottom:10px">${weekLabel}</div>
    <div style="font-size:20px;font-weight:700;color:${headlineColor};margin-bottom:10px">${headline}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
      <div style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:8px 10px">
        <div style="font-size:18px;font-weight:700;color:var(--text1);line-height:1">${sessions}</div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px">Session${sessions!==1?'s':''}</div>
      </div>
      <div style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:8px 10px">
        <div style="font-size:18px;font-weight:700;color:var(--text1);line-height:1">${fmtMin(totalMins)}</div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px">Total time</div>
      </div>
      <div style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:8px 10px">
        <div style="font-size:18px;font-weight:700;color:var(--text1);line-height:1">${activeDays}<span style="font-size:12px;color:var(--text4)">/7</span></div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px">Active days</div>
      </div>
      <div style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:8px 10px">
        <div style="font-size:18px;font-weight:700;color:${goalDays>0?'var(--green)':'var(--text4)'};line-height:1">${goalDays}<span style="font-size:12px;color:var(--text4)">/7</span></div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-top:3px">Goal days hit</div>
      </div>
    </div>
    ${bestDayName?`<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Best day: <strong style="color:var(--text2)">${bestDayName}</strong> — ${fmtMin(bestDay.mins)}</div>`:''}
    <div style="font-size:11px;color:var(--text4);line-height:1.6;border-top:1px solid var(--stat-border);padding-top:8px">${compLine}</div>
  </div>`;

// ── PHOTOS ─────────────────────────────────────────────────────────────────────
let compareA=null,compareB=null;
let expandedEras=new Set(); // tracks which era keys are expanded

function groupPhotosIntoEras(sortedPhotos){
  // Groups photos with ≤30 day gaps into eras, newest first
  if(!sortedPhotos.length)return[];
  const eras=[];
  let current=[sortedPhotos[0]];
  for(let i=1;i<sortedPhotos.length;i++){
    const prev=new Date(sortedPhotos[i-1].date+'T12:00:00');
    const curr=new Date(sortedPhotos[i].date+'T12:00:00');
    const dayGap=Math.round((prev-curr)/86400000);
    if(dayGap<=30){
      current.push(sortedPhotos[i]);
    } else {
      eras.push(current);
      current=[sortedPhotos[i]];
    }
  }
  eras.push(current);
  return eras;
}

function eraLabel(photos){
  // Newest and oldest date in era
  const dates=photos.map(p=>p.date).sort();
  const oldest=dates[0],newest=dates[dates.length-1];
  const oldDt=new Date(oldest+'T12:00:00');
  const newDt=new Date(newest+'T12:00:00');
  const fmt=(d,showYear)=>d.toLocaleDateString('en',{month:'short',...(showYear?{year:'numeric'}:{})});
  if(oldest===newest)return fmt(oldDt,true);
  if(oldDt.getFullYear()!==newDt.getFullYear())
    return`${fmt(oldDt,true)} – ${fmt(newDt,true)}`;
  if(oldDt.getMonth()!==newDt.getMonth())
    return`${fmt(oldDt,false)} – ${fmt(newDt,true)}`;
  return fmt(oldDt,true);
}

function eraKey(era){
  return era.map(p=>p.id).join('-');
}

function eraCI(era){
  // CI range across the era
  const cis=era.map(p=>parseInt(p.ci.replace('CI-',''))).filter(n=>!isNaN(n));
  if(!cis.length)return'';
  const mn=Math.min(...cis),mx=Math.max(...cis);
  return mn===mx?`CI-${mn}`:`CI-${mn} → CI-${mx}`;
}

function toggleEra(key){
  if(expandedEras.has(key))expandedEras.delete(key);
  else expandedEras.add(key);
  // Re-render just the photos tab content without full render
  const c=document.getElementById('content');
  if(c&&tab==='photos'){c.innerHTML=renderPhotos();attachEvents();}
}

    const expandedHtml=isExpanded?`<div style="margin-top:12px;border-top:1px solid var(--stat-border);padding-top:12px;display:flex;flex-direction:column;gap:12px">

  const lastPhoto=sorted[0];

  const photoNudge=daysSincePhoto>=30?`<div style="background:var(--acc6);border:1px solid var(--acc18);border-radius:10px;padding:10px 12px;margin-bottom:9px;font-size:11px;color:var(--text2);line-height:1.6">

function comparePickTap(id){
  const photo=photos.find(p=>p.id===id);if(!photo)return;
  if(compareA&&compareA.id===id){
    // deselect A
    compareA=null;
    updateComparePickUI();return;
  }
  if(compareB&&compareB.id===id){
    compareB=null;
    updateComparePickUI();return;
  }
  if(!compareA){compareA=photo;}
  else if(!compareB&&id!==compareA.id){compareB=photo;}
  updateComparePickUI();
}

function updateComparePickUI(){
  const sorted=[...photos].sort((a,b)=>b.date.localeCompare(a.date));
  sorted.forEach(p=>{
    const el=document.getElementById(`cpt-${p.id}`);
    const badge=document.getElementById(`cpt-badge-${p.id}`);
    if(!el)return;
    const isA=compareA&&compareA.id===p.id;
    const isB=compareB&&compareB.id===p.id;
    el.style.borderColor=isA?'var(--accent)':isB?'#22a85a':'transparent';
    if(badge){
      if(isA){badge.style.display='flex';badge.textContent='A';}
      else if(isB){badge.style.display='flex';badge.textContent='B';}
      else badge.style.display='none';
    }
  });
  const instr=document.getElementById('compare-instr');
  const goBtn=document.getElementById('compare-go-btn');
  if(!compareA&&!compareB&&instr)instr.innerHTML='Tap to select your <strong style="color:var(--text2)">first</strong> photo (Before)';
  else if(compareA&&!compareB&&instr)instr.innerHTML='Now select your <strong style="color:var(--text2)">second</strong> photo (After)';
  else if(compareA&&compareB&&instr)instr.innerHTML='Ready to compare — tap <strong style="color:var(--text2)">Compare</strong>';
  if(goBtn)goBtn.disabled=!(compareA&&compareB);
}

function openCompareViewer(){
  const ex=document.getElementById('compare-view-ov');if(ex)ex.remove();
  let a=compareA,b=compareB;
  // Sort so older = left by default
  if(a.date>b.date){const tmp=a;a=b;b=tmp;}

  function buildViewer(pA,pB){
    const el=document.getElementById('compare-view-ov');
    if(!el)return;
    const diffDays=Math.abs(Math.round((new Date(pB.date)-new Date(pA.date))/86400000));

    const ciA=parseInt(pA.ci.replace('CI-',''));
    const ciB=parseInt(pB.ci.replace('CI-',''));
    const ciChange=ciB-ciA;
    const ciNote=ciChange>0?`<span style="color:#22a85a;font-weight:600">+${ciChange} CI level${ciChange>1?'s':''}</span>`:ciChange<0?`<span style="color:#c0392b">${ciChange} CI</span>`:`<span style="color:var(--text4)">Same CI</span>`;

    el.querySelector('.compare-inner').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px">
        <div style="font-family:Cinzel,serif;font-size:13px;color:var(--accent)">Progress Comparison</div>
        <button onclick="document.getElementById('compare-view-ov').remove()" style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:20px;padding:4px 12px;color:var(--text3);font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif">Close</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="background:var(--bg-stat);border-radius:10px;border:2px solid var(--acc30);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:140px">
            <img src="${pA.url}" style="width:100%;height:auto;max-height:200px;object-fit:contain;display:block" alt="${pA.ci}">
          </div>
          <div style="text-align:center;margin-top:5px">
            <div style="font-family:Cinzel,serif;font-size:13px;font-weight:700;color:var(--accent)">${pA.ci}</div>
            <div style="font-size:10px;color:var(--text4)">${pA.date}</div>
            ${pA.note?`<div style="font-size:9px;color:var(--text5);font-style:italic;margin-top:2px">${pA.note.slice(0,30)}</div>`:''}
          </div>
        </div>
        <div>
          <div style="background:var(--bg-stat);border-radius:10px;border:2px solid var(--green-border,rgba(34,168,90,.4));overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:140px">
            <img src="${pB.url}" style="width:100%;height:auto;max-height:200px;object-fit:contain;display:block" alt="${pB.ci}">
          </div>
          <div style="text-align:center;margin-top:5px">
            <div style="font-family:Cinzel,serif;font-size:13px;font-weight:700;color:var(--accent)">${pB.ci}</div>
            <div style="font-size:10px;color:var(--text4)">${pB.date}</div>
            ${pB.note?`<div style="font-size:9px;color:var(--text5);font-style:italic;margin-top:2px">${pB.note.slice(0,30)}</div>`:''}
          </div>
        </div>
      </div>

      <div style="background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-around;text-align:center;margin-bottom:12px">
        <div><div style="font-size:11px;color:var(--text4)">Time span</div><div style="font-size:13px;font-weight:600;color:var(--text1);margin-top:2px">${span}</div></div>
        <div style="width:1px;background:var(--stat-border)"></div>
        <div><div style="font-size:11px;color:var(--text4)">CI change</div><div style="font-size:13px;font-weight:600;margin-top:2px">${ciNote}</div></div>
      </div>

      <button onclick="swapCompare()" style="width:100%;background:var(--bg-stat);border:1px solid var(--stat-border);border-radius:8px;padding:9px;color:var(--text3);font-size:12px;cursor:pointer;font-family:DM Sans,sans-serif">⇄ Swap Before / After</button>`;
  }

  const wrapper=document.createElement('div');
  wrapper.id='compare-view-ov';
  wrapper.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto;';

// ── REPORTS ────────────────────────────────────────────────────────────────────
function renderReports(){
  const td=today();
  const liveMins=liveTimerTodayMins();
  const wDays=thisWeekDays(),wMins=wDays.map(d=>{
    const logged=logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0);
    return logged+(d===td?liveMins:0); // add live time to today's bar
  });
  const maxM=Math.max(...wMins,1);
  const bars=wMins.map((m,i)=>{const h=Math.max(2,Math.round((m/maxM)*88)),isT=wDays[i]===today();
    return`<div class="bar-col"><div class="bar-val">${m>0?fmtMin(m):''}</div><div class="bar${isT?' today':''}" style="height:${h}px"></div><div class="bar-lbl" style="color:${isT?'var(--accent)':'var(--text4)'}">${dayLbl(wDays[i])}</div></div>`;
  }).join('');
  // Method breakdown — only methods actually used, by name
  const methodTotals={};
  logs.forEach(l=>{
    if(!l.method)return;
    if(!methodTotals[l.method])methodTotals[l.method]={mins:0,cat:l.cat};
    methodTotals[l.method].mins+=l.dur;
  });
  const usedMethods=Object.entries(methodTotals).sort((a,b)=>b[1].mins-a[1].mins);
  const totMethodM=usedMethods.reduce((a,[,v])=>a+v.mins,0)||1;
  const catBars=usedMethods.map(([method,{mins,cat}])=>{
    const c=catFor(cat);
    const p=Math.round((mins/totMethodM)*100);
    return`<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px">${method}</span>
        <span style="color:${c.color};flex-shrink:0">${fmtMin(mins)} · ${p}%</span>
      </div>
      <div style="height:7px;background:var(--bg-stat);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:${c.color};width:${p}%;transition:width .6s"></div></div>
    </div>`;
  }).join('');
  const cal35=[];for(let i=34;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);cal35.push(d.toISOString().split('T')[0]);}
  const activeDays=new Set(logs.map(l=>l.date));
  const goalDaysSet=new Set();
  cal35.forEach(d=>{if(logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0)>=(char.dailyGoalMin||120))goalDaysSet.add(d);});
  const calDots=cal35.map(d=>`<div class="cal-dot${goalDaysSet.has(d)?' goal':activeDays.has(d)?' on':''}${d===today()?' now':''}"></div>`).join('');
  const weekTotal=wMins.reduce((a,m)=>a+m,0); // already includes live time via wMins
  const monthTotal=logs.filter(l=>l.date.slice(0,7)===td.slice(0,7)).reduce((a,l)=>a+l.dur,0)+liveMins;
  const histHtml=logs.length?logs.slice(0,40).map(l=>{const cat=catFor(l.cat);return`
    <div style="display:flex;gap:10px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--stat-border);border-radius:10px;padding:10px;margin-bottom:7px">
      <div style="width:32px;height:32px;border-radius:7px;background:${cat.color}18;border:1px solid ${cat.color}33;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${cat.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.method}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:1px">${l.date} · ${fmtMin(l.dur)}${l.notes?' · '+l.notes.slice(0,45):''}</div>
      </div>
      <button class="del-btn" data-id="${l.id}" style="flex-shrink:0">✕</button>
    </div>`}).join(''):`<div class="empty">No sessions logged yet.</div>`;

  // ── CI PROGRESSION CHART ──
  const ciChart=buildCIChart();

  return`<div class="page-title">Reports</div>
  <div class="page-sub">Your restoration journey in numbers.</div>
  <div class="sg2">
    <div class="stat"><div class="sv" style="font-size:15px">${fmtMin(weekTotal)}</div><div class="sl">This Week</div></div>
    <div class="stat"><div class="sv" style="font-size:15px">${fmtMin(monthTotal)}</div><div class="sl">This Month</div></div>
    <div class="stat"><div class="sv" style="font-size:15px">${(char.minutes/60).toFixed(1)}h</div><div class="sl">All Time</div></div>
    <div class="stat"><div class="sv" style="font-size:15px;color:#F59E0B">${char.streak}</div><div class="sl">Best Streak</div></div>
  </div>
  <div class="sec-title">CI Progression</div>
  <div class="card" style="padding:14px 10px 10px">${ciChart}</div>
  <div class="sec-title">This Week</div>
  <div class="card"><div class="bar-wrap">${bars}</div></div>
  <div class="sec-title">Activity Calendar (35 days)</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text5);margin-bottom:4px"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
    <div class="cal-grid">${calDots}</div>
    <div style="display:flex;gap:10px;margin-top:7px;font-size:9px;color:var(--text4);flex-wrap:wrap">
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--acc45);vertical-align:middle;margin-right:3px"></span>Active</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:rgba(34,168,90,.55);vertical-align:middle;margin-right:3px"></span>Goal met</span>
    </div>
  </div>
  <div class="sec-title">Method Breakdown</div>
  <div class="card">${catBars||`<div style="color:var(--text5);font-size:11px;text-align:center;padding:10px">No sessions yet.</div>`}</div>
  <div class="sec-title">Export Data</div>
  <div class="card" style="display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:13px;font-weight:600;color:var(--text1)">Download Session Log</div>
    <div style="font-size:10px;color:var(--text4);margin-top:2px">${logs.length} sessions · CSV format</div></div>
    <button class="btn-outline" id="export-btn">📊 Export CSV</button>
  </div>
  <div class="sec-title">Session History</div>${histHtml}`;
}

// ── CI PROGRESSION CHART ───────────────────────────────────────────────────────
function buildCIChart(){
  const history=char.ciHistory||[];
  const currentCI=char.ciLevel||0;

  // Build point list — deduplicate same-day entries, keep latest per day
  // Include current CI as the final point at today
  const raw=[...history];
  // Always anchor the last known point to today's date if current CI set
  if(currentCI>0){
    // Add today as the current level if not already recorded today
    const td=today();
    if(!raw.length||raw[raw.length-1]?.date!==td){
      raw.push({ci:currentCI,date:td});
    }
  }

  if(raw.length<2){
    return`<div style="text-align:center;padding:20px 10px;color:var(--text5);font-size:11px;line-height:2">
      Update your CI level at least twice to see your progression chart.<br>
      <span style="font-size:10px">Go to Journey → Update to set your current CI.</span>
    </div>`;
  }

  // Sort by date
  const pts=raw.sort((a,b)=>a.date.localeCompare(b.date));

  // Chart dimensions
  const W=310,H=120,padL=28,padR=10,padT=10,padB=22;
  const chartW=W-padL-padR,chartH=H-padT-padB;

  // X scale — date range
  const dates=pts.map(p=>new Date(p.date+'T12:00:00'));
  const minT=dates[0].getTime(),maxT=dates[dates.length-1].getTime();
  const xRange=maxT-minT||1;
  const xOf=t=>padL+((t-minT)/xRange)*chartW;

  // Y scale — CI 0–10
  const yOf=ci=>padT+chartH-((ci/10)*chartH);

  // Build stepped path (horizontal then vertical — staircase)
  let pathD='';
  for(let i=0;i<pts.length;i++){
    const x=xOf(dates[i].getTime());
    const y=yOf(pts[i].ci);
    if(i===0){pathD+=`M${x.toFixed(1)},${y.toFixed(1)}`;}
    else{
      // Step: go horizontal first at prev Y, then vertical to new Y
      const prevY=yOf(pts[i-1].ci);
      pathD+=` H${x.toFixed(1)} V${y.toFixed(1)}`;
    }
  }
  // Extend to right edge at current level
  const lastX=xOf(dates[dates.length-1].getTime());
  const lastY=yOf(pts[pts.length-1].ci);

  // Area fill path
  const areaD=pathD+` H${(padL+chartW).toFixed(1)} V${(padT+chartH).toFixed(1)} H${padL.toFixed(1)} Z`;

  // Y axis labels — 0, 2, 4, 6, 8, 10
  const yLabels=[0,2,4,6,8,10].map(v=>{
    const y=yOf(v);
    return`<text x="${(padL-5).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="7" fill="var(--text5)" text-anchor="end" font-family="DM Sans,sans-serif">${v}</text>
    <line x1="${padL}" y1="${y.toFixed(1)}" x2="${(padL+chartW).toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--stat-border)" stroke-width="0.5"/>`;
  }).join('');

  // X axis date labels — first and last
  const fmtDateShort=d=>{const dt=new Date(d+'T12:00:00');return`${dt.toLocaleString('default',{month:'short'})} '${String(dt.getFullYear()).slice(2)}`;};
  const xLabels=`
    <text x="${padL}" y="${H-4}" font-size="7" fill="var(--text5)" text-anchor="start" font-family="DM Sans,sans-serif">${fmtDateShort(pts[0].date)}</text>
    <text x="${(padL+chartW).toFixed(1)}" y="${H-4}" font-size="7" fill="var(--text5)" text-anchor="end" font-family="DM Sans,sans-serif">${fmtDateShort(pts[pts.length-1].date)}</text>`;

  // Data point dots + tooltips
  const dots=pts.map((p,i)=>{
    const x=xOf(dates[i].getTime());
    const y=yOf(p.ci);
    const isLast=i===pts.length-1;
    return`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isLast?4:3}" fill="${isLast?'var(--accent)':'var(--bg-card)'}" stroke="var(--accent)" stroke-width="1.5"/>
    ${isLast?`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="7" fill="var(--accent)" opacity="0.15"/>`:''}
    <title>${p.date}: CI-${p.ci}</title>`;
  }).join('');

  // Current CI callout label at last point
  const callout=`<text x="${(Math.min(lastX+6,padL+chartW-18)).toFixed(1)}" y="${(lastY-6).toFixed(1)}" font-size="9" font-weight="700" fill="var(--accent)" font-family="Cinzel,serif">CI-${pts[pts.length-1].ci}</text>`;

  const totalDays=Math.round(xRange/86400000);
  const spanLabel=totalDays<60?`${totalDays}d`:totalDays<365?`${Math.round(totalDays/30.4)}mo`:`${(totalDays/365).toFixed(1)}yr`;

  return`
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;padding:0 4px">
    <div style="font-size:11px;font-weight:600;color:var(--text2)">CI-0 → CI-${pts[pts.length-1].ci}</div>
    <div style="font-size:10px;color:var(--text4)">${spanLabel} tracked</div>
  </div>
  <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;overflow:visible">
    <defs>
      <linearGradient id="ciAreaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${yLabels}
    <path d="${areaD}" fill="url(#ciAreaGrad)"/>
    <path d="${pathD}" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${callout}
    ${xLabels}
  </svg>`;
}

// ── BACKUP / RESTORE ───────────────────────────────────────────────────────────
function exportBackup(){
  const backup={
    version:1,
    exportedAt:new Date().toISOString(),
    profiles,
    data:{}
  };
  profiles.forEach(p=>{
    backup.data[p.id]={
      char:S.get(`rst-${p.id}-char`),
      logs:S.get(`rst-${p.id}-logs`),
      photos:S.get(`rst-${p.id}-photos`)
    };
  });
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dateStr=today().replace(/-/g,'');
  a.href=url;a.download=`restoretrack-backup-${dateStr}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✅ Backup saved!');
}
function importBackup(jsonText){
  let backup;
  try{backup=JSON.parse(jsonText);}
  catch{showToast('⚠ Invalid backup file');return;}
  if(!backup.profiles||!backup.data){showToast('⚠ Unrecognised backup format');return;}
  confirmDialog(
    'Import this backup?',
    `This will restore ${backup.profiles.length} profile${backup.profiles.length!==1?'s':''} from ${backup.exportedAt?.slice(0,10)||'unknown date'}. Your current data will be replaced.`,
    'Import',
    ()=>{
      // Write all profile data back to localStorage
      backup.profiles.forEach(p=>{
        const d=backup.data[p.id]||{};
        if(d.char)S.set(`rst-${p.id}-char`,d.char);
        if(d.logs)S.set(`rst-${p.id}-logs`,d.logs);
        if(d.photos)S.set(`rst-${p.id}-photos`,d.photos);
      });
      S.set('rst-profiles',backup.profiles);
      // Switch to first profile
      const firstPid=backup.profiles[0]?.id;
      if(firstPid)S.set('rst-active-pid',firstPid);
      showToast('✅ Backup restored!');
      // Full reload to pick up all new data
      setTimeout(()=>{loadAll();render();},400);
    }
  );
}

// ── MANUAL TIME HELPERS ────────────────────────────────────────────────────────
function calcManualMins(){
  if(!manualStart||!manualEnd)return 0;
  const [sh,sm]=manualStart.split(':').map(Number);
  const [eh,em]=manualEnd.split(':').map(Number);
  let startM=sh*60+sm, endM=eh*60+em;
  if(endM<=startM)endM+=24*60; // crossed midnight
  const diff=endM-startM;
  return diff>0&&diff<=24*60?diff:0;
}
function calcManualPreview(){
  if(manualStillActive){
    if(!manualStart)return'Enter your start time above';
    const now=new Date();
    const [sh,sm]=manualStart.split(':').map(Number);
    let startMs=new Date();startMs.setHours(sh,sm,0,0);
    let diff=Math.floor((now-startMs)/60000);
    if(diff<0)diff+=24*60; // started yesterday
    if(diff<=0)return'<span style="color:#c0392b">Start time must be in the past</span>';
    return`Running since ${manualStart} — <strong style="color:var(--green);font-size:15px">${fmtMin(diff)}</strong> so far`;
  }
  const mins=calcManualMins();
  if(!manualStart||!manualEnd)return'Enter a start and end time above';
  if(mins===0)return'<span style="color:#c0392b">End time must be after start time</span>';
  const crossed=()=>{const[sh]=manualStart.split(':').map(Number);const[eh]=manualEnd.split(':').map(Number);return eh<sh;};
  return`<strong style="color:var(--text1);font-size:15px">${fmtMin(mins)}</strong><span style="color:var(--text4);font-size:11px"> total${crossed()?' · crossed midnight':''}`;
}
function updateManualPreview(){
  const el=document.getElementById('manual-duration-preview');
  if(el)el.innerHTML=calcManualPreview();
  const logBtn=document.getElementById('s-log');
  if(logBtn)logBtn.disabled=!(sheetMethod&&sheetCat&&calcManualMins()>0);
  const startFromBtn=document.getElementById('s-start-from');
  if(startFromBtn){
    startFromBtn.disabled=!(sheetMethod&&sheetCat&&manualStart);
    if(manualStart)startFromBtn.textContent=`▶ Start from ${manualStart}`;
  }
}
function beginSessionFrom(startTimeStr){
  if(!sheetMethod||!sheetCat||!startTimeStr)return;
  const [sh,sm]=startTimeStr.split(':').map(Number);
  const startDate=new Date();startDate.setHours(sh,sm,0,0);
  let elapsedMs=Date.now()-startDate.getTime();
  if(elapsedMs<0)elapsedMs+=24*60*60*1000; // handles midnight edge
  const elapsedSecs=Math.floor(elapsedMs/1000);
  // Start the timer but wind it back by the elapsed time
  activeTimer={startedAt:Date.now()-elapsedMs,method:sheetMethod,cat:sheetCat,notes:sheetNotes,elapsedOnPause:0};
  timerSecs=elapsedSecs;
  saveTimer(activeTimer);startInterval();
  showSessionSheet=false;manualStillActive=false;
  if(navigator.vibrate)navigator.vibrate(60);
  showToast(`⏱ Timer started from ${startTimeStr} — ${fmtMin(Math.floor(elapsedSecs/60))} already logged`);
  render();
}
